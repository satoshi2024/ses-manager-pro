name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: mvn test (H2, no MySQL required)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: mvn -B test

      - name: Ensure no tests were skipped
        run: |
          skipped_files=$(grep -l 'skipped="[1-9]' target/surefire-reports/*.xml | grep -vE 'InvoicePdfServiceImplTest|QuotationPdfServiceImplTest' || true)
          if [ -n "$skipped_files" ]; then
            echo "Error: Tests were skipped. This is not allowed to prevent silent regressions."
            echo "$skipped_files"
            exit 1
          fi

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7
