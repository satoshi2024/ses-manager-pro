spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations:
        - classpath:db/migration/V1__create_tables.sql
        - classpath:db/migration/V2__init_master_data.sql
        - classpath:db/migration/V4__create_notification.sql
        - classpath:db/migration/V5__create_work_record_billing.sql
        - classpath:db/migration/V6__create_sales_activity.sql
        - classpath:db/migration/V7__create_analytics_report.sql
        - classpath:db/migration/V8__user_security_columns.sql
        - classpath:db/migration/V9__system_config_and_menu.sql
        - classpath:sql/schema-audit-log-h2.sql
        - classpath:sql/schema-invoice-duedate-h2.sql
        - classpath:sql/schema-contract-document-h2.sql
        - classpath:sql/schema-freee-payroll-h2.sql
      data-locations:
        - classpath:sql/dummy.sql

  h2:
    console:
      enabled: false

  # 001~008(現db/migration/V1~V9)は上のschema-locationsで直接投入するため、
  # MySQL向けのFlywayマイグレーションは適用しない(二重適用を防止)。
  flyway:
    enabled: false

# MyBatis Plus for test
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.ses.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

app:
  upload:
    base-path: ./target/test-uploads
  mail:
    from: test@example.com

ai:
  enabled: false

logging:
  level:
    com.ses: DEBUG
