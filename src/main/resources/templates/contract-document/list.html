<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head><title>契約書・電子署名</title></head>
<body>
<div layout:fragment="content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="text-white fw-bold"><i class="bi bi-file-earmark-check me-2 text-accent-blue"></i>契約書・電子署名</h4>
    <div>
        <button class="btn btn-outline-info me-2" onclick="openTemplateModal()"><i class="bi bi-list me-1"></i>テンプレート一覧</button>
        <button class="btn btn-primary bg-gradient-blue border-0 shadow-sm rounded-pill px-3" onclick="openCreateModal()"><i class="bi bi-plus-lg me-1"></i>新規作成</button>
    </div>
  </div>

  <div class="card bg-card border-dark shadow-sm mb-4">
      <div class="card-body p-3">
          <form class="row g-3 align-items-end" id="search-form">
              <div class="col-md-6">
                  <label class="form-label text-muted small mb-1">対象の契約を選択</label>
                  <select class="form-select form-select-sm form-select-dark bg-secondary text-white border-dark" id="contractIdSelect" onchange="loadDocuments()">
                      <option value="">契約を選択...</option>
                  </select>
              </div>
          </form>
      </div>
  </div>

  <div class="card bg-card border-dark shadow-sm">
      <div class="card-body p-0">
          <div class="table-responsive">
              <table class="table table-dark table-hover table-striped mb-0 align-middle">
                  <thead class="table-secondary border-dark">
                      <tr>
                          <th class="px-4 py-3 text-muted small">ID</th>
                          <th class="py-3 text-muted small">宛先名</th>
                          <th class="py-3 text-muted small">メールアドレス</th>
                          <th class="py-3 text-muted small">ステータス</th>
                          <th class="py-3 text-muted small">送信日時</th>
                          <th class="px-4 py-3 text-end text-muted small">操作</th>
                      </tr>
                  </thead>
                  <tbody class="border-top-0" id="document-table-body">
                      <tr><td colspan="6" class="text-center text-muted py-4">契約を選択してください</td></tr>
                  </tbody>
              </table>
          </div>
      </div>
  </div>

  <!-- Create Document Modal -->
  <div class="modal fade" id="createDocModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content bg-card border-dark shadow-lg">
              <div class="modal-header border-dark bg-dark">
                  <h5 class="modal-title text-white fw-bold"><i class="bi bi-file-earmark-plus me-2 text-accent-green"></i>契約書作成</h5>
                  <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body p-4">
                  <form id="createDocForm">
                      <div class="mb-3">
                          <label class="form-label text-muted small">契約</label>
                          <select id="newDocContractId" class="form-select form-select-dark bg-secondary text-white border-dark" required>
                              <option value="">選択してください</option>
                          </select>
                      </div>
                      <div class="mb-3">
                          <label class="form-label text-muted small">テンプレート</label>
                          <select id="newDocTemplateId" class="form-select form-select-dark bg-secondary text-white border-dark" required>
                              <option value="">選択してください</option>
                          </select>
                      </div>
                      <div class="mb-3">
                          <label class="form-label text-muted small">宛先名</label>
                          <input type="text" id="newDocRecipientName" class="form-control form-control-dark bg-secondary text-white border-dark" required>
                      </div>
                      <div class="mb-3">
                          <label class="form-label text-muted small">メールアドレス</label>
                          <input type="email" id="newDocRecipientEmail" class="form-control form-control-dark bg-secondary text-white border-dark" required>
                      </div>
                  </form>
              </div>
              <div class="modal-footer border-dark bg-dark">
                  <button type="button" class="btn btn-outline-secondary text-muted hover-text-white border-dark" data-bs-dismiss="modal">キャンセル</button>
                  <button type="button" class="btn btn-primary bg-gradient-blue border-0 shadow-sm px-4" onclick="createDocument()">作成</button>
              </div>
          </div>
      </div>
  </div>

  <!-- Templates Modal -->
  <div class="modal fade" id="templatesModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content bg-card border-dark shadow-lg">
              <div class="modal-header border-dark bg-dark">
                  <h5 class="modal-title text-white fw-bold"><i class="bi bi-list me-2 text-accent-blue"></i>テンプレート管理</h5>
                  <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body p-4">
                  <div class="mb-3 text-end">
                      <button class="btn btn-sm btn-success rounded-pill px-3" onclick="showCreateTemplateForm()"><i class="bi bi-plus-lg me-1"></i>新規</button>
                  </div>
                  <div class="table-responsive">
                      <table class="table table-sm table-dark table-striped">
                          <thead>
                              <tr><th class="text-muted small">ID</th><th class="text-muted small">名前</th><th class="text-muted small">タイプ</th><th class="text-muted small">Ver</th></tr>
                          </thead>
                          <tbody id="template-table-body"></tbody>
                      </table>
                  </div>
                  <div id="createTemplateFormArea" style="display:none;" class="mt-4 p-3 border border-secondary rounded bg-dark">
                      <h6 class="text-white mb-3">テンプレート新規作成</h6>
                      <form id="createTemplateForm">
                          <div class="mb-2">
                              <label class="form-label small text-muted">名前</label>
                              <input type="text" id="newTplName" class="form-control form-control-sm form-control-dark bg-secondary text-white border-dark" required>
                          </div>
                          <div class="mb-2">
                              <label class="form-label small text-muted">タイプ</label>
                              <input type="text" id="newTplType" class="form-control form-control-sm form-control-dark bg-secondary text-white border-dark" required>
                          </div>
                          <div class="mb-2">
                              <label class="form-label small text-muted">HTMLコンテンツ</label>
                              <textarea id="newTplHtml" class="form-control form-control-sm form-control-dark bg-secondary text-white border-dark" rows="5" required></textarea>
                          </div>
                          <div class="text-end mt-3">
                              <button type="button" class="btn btn-sm btn-outline-secondary" onclick="hideCreateTemplateForm()">キャンセル</button>
                              <button type="button" class="btn btn-sm btn-primary px-3" onclick="createTemplate()">登録</button>
                          </div>
                      </form>
                  </div>
              </div>
          </div>
      </div>
  </div>
</div>
<th:block layout:fragment="page-js">
    <script th:src="@{/js/modules/contract-document.js}"></script>
</th:block>
</body>
</html>
