<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="#{ai.title}">AIマッチング・アシスタント - SES Manager Pro</title>
    <!-- marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .chat-container {
            height: calc(100vh - 250px);
            display: flex;
            flex-direction: column;
        }
        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1rem;
            background-color: var(--bs-dark);
            border-radius: 0.5rem;
            border: 1px solid var(--bs-border-color);
        }
        .message {
            margin-bottom: 1.5rem;
            max-width: 85%;
        }
        .message.user {
            margin-left: auto;
        }
        .message.ai {
            margin-right: auto;
        }
        .message-content {
            padding: 1rem;
            border-radius: 1rem;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, var(--bs-primary), #6f42c1);
            color: white;
            border-bottom-right-radius: 0;
        }
        .message.ai .message-content {
            background-color: var(--bs-secondary);
            color: var(--bs-light);
            border-bottom-left-radius: 0;
        }
        .message.ai .message-content pre {
            background-color: #212529;
            padding: 1rem;
            border-radius: 0.5rem;
        }
        /* Settings panel */
        .ai-settings {
            background-color: var(--bs-tertiary-bg);
            border: 1px solid var(--bs-border-color);
            border-radius: 0.5rem;
            padding: 1.5rem;
        }
        /* Typing dots animation */
        .typing-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--bs-light);
            margin: 0 3px;
            animation: dotBounce 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        .typing-dots span:nth-child(3) { animation-delay: 0s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
        /* Typewriter cursor */
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background-color: var(--bs-light);
            margin-left: 1px;
            animation: cursorBlink 0.7s infinite;
            vertical-align: text-bottom;
        }
        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 mb-0"><i class="bi bi-robot text-accent-purple me-2"></i><th:block th:text="#{ai.title}">AIマッチング・アシスタント</th:block></h2>
            <button class="btn btn-outline-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#settingsPanel" aria-expanded="false" aria-controls="settingsPanel">
                <i class="bi bi-gear-fill me-1"></i><th:block th:text="#{common.btn.settings}">設定</th:block>
            </button>
        </div>

        <div class="collapse mb-4" id="settingsPanel">
            <div class="ai-settings shadow-sm">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="geminiApiKey" class="form-label"><i class="bi bi-key-fill text-warning me-1"></i>Gemini API Key <span class="text-danger">*</span></label>
                        <input type="password" class="form-control form-control-dark bg-secondary text-white border-dark" id="geminiApiKey" th:placeholder="#{ai.placeholder.apiKey}" placeholder="AI Studioで取得したAPIキーを入力">
                        <div class="form-text text-muted small" th:text="#{ai.hint.apiKeyStorage}">※APIキーはブラウザにのみ保存され、サーバーには保存されません。</div>
                    </div>
                    <div class="col-md-3">
                        <label for="contextEngineer" class="form-label"><i class="bi bi-person-badge text-info me-1"></i><th:block th:text="#{ai.label.contextEngineer}">対象要員 (コンテキスト)</th:block></label>
                        <select class="form-select form-select-dark bg-secondary text-white border-dark" id="contextEngineer">
                            <option value="" th:text="#{common.label.unspecified}">-- 指定なし --</option>
                            <!-- Dynamically loaded -->
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="contextProject" class="form-label"><i class="bi bi-folder-fill text-success me-1"></i><th:block th:text="#{ai.label.contextProject}">対象案件 (コンテキスト)</th:block></label>
                        <select class="form-select form-select-dark bg-secondary text-white border-dark" id="contextProject">
                            <option value="" th:text="#{common.label.unspecified}">-- 指定なし --</option>
                            <!-- Dynamically loaded -->
                        </select>
                    </div>
                    <div class="col-12 mt-3 text-end">
                        <button class="btn btn-primary btn-sm px-4" id="saveSettingsBtn" th:text="#{common.btn.saveSettings}">設定を保存</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-messages mb-3 shadow-sm" id="chatBox">
                <div class="message ai d-flex align-items-start" id="welcomeMessage">
                    <div class="avatar bg-gradient-purple text-white rounded-circle me-2 d-flex align-items-center justify-content-center flex-shrink-0" style="width: 40px; height: 40px;">
                        <i class="bi bi-robot"></i>
                    </div>
                    <div class="message-content shadow-sm" id="welcomeContent">
                        <div class="typing-dots">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="chat-input-area mt-auto">
                <div class="input-group">
                    <textarea class="form-control form-control-dark bg-secondary text-white border-dark" id="chatInput" rows="2" th:placeholder="#{ai.placeholder.chat}" style="resize: none;"></textarea>
                    <button class="btn btn-primary px-4 d-flex align-items-center justify-content-center" id="sendBtn" type="button" style="width: 100px;">
                        <span id="sendIcon"><i class="bi bi-send-fill fs-5"></i></span>
                        <span id="sendSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="page-js">
        <script src="/js/modules/ai.js"></script>
    </th:block>
</body>
</html>
