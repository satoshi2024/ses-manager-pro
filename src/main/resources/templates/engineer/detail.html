<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>要員詳細</title>
</head>
<body>

<div layout:fragment="content">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="text-white fw-bold mb-1">
                <i class="bi bi-person-badge me-2 text-accent-blue"></i>
                <span id="eng-name">田中 太郎</span> 
                <span class="fs-6 text-muted ms-2" id="eng-initial">(T.T)</span>
            </h4>
            <p class="text-muted small mb-0">エンジニア詳細情報およびAIマッチング</p>
        </div>
        <div class="d-flex gap-2">
            <a href="/engineer/list" class="btn btn-outline-secondary text-muted hover-text-white border-dark">
                <i class="bi bi-arrow-left me-1"></i>戻る
            </a>
            <button class="btn btn-outline-secondary text-muted hover-text-white border-dark" onclick="generateSkillSheet(currentEngineerId)">
                <i class="bi bi-file-earmark-pdf me-1"></i>スキルシート自動生成
            </button>
            <button class="btn btn-primary bg-gradient-purple border-0 shadow-sm" onclick="showAiMatchModal(currentEngineerId, currentEngineerName)">
                <i class="bi bi-robot me-1"></i>AIマッチング実行
            </button>
        </div>
    </div>

    <div class="row g-4">
        <!-- Profile Card -->
        <div class="col-md-4">
            <div class="card bg-card border-dark shadow-sm h-100">
                <div class="card-body p-4 text-center">
                    <div class="avatar bg-gradient-blue text-white rounded-circle d-flex justify-content-center align-items-center mx-auto mb-3 shadow" style="width: 100px; height: 100px; font-size: 2.5rem;">
                        T.T
                    </div>
                    <h5 class="text-white fw-bold mb-1" id="det-name">名前</h5>
                    <div class="mb-3" id="det-status"><i class="bi bi-check-circle-fill me-1"></i>ステータス</div>
                    
                    <div class="d-flex flex-wrap justify-content-center gap-2 mb-4" id="det-skills">
                        <span class="badge bg-secondary border border-dark text-light">スキルなし</span>
                    </div>

                    <ul class="list-group list-group-flush text-start border-top border-dark pt-3">
                        <li class="list-group-item bg-transparent border-0 px-0 py-2 d-flex justify-content-between text-muted small">
                            <span>経験年数</span>
                            <span class="text-white fw-bold" id="det-experience">-</span>
                        </li>
                        <li class="list-group-item bg-transparent border-0 px-0 py-2 d-flex justify-content-between text-muted small">
                            <span>希望単価</span>
                            <span class="text-white fw-bold" id="det-price">-</span>
                        </li>
                        <li class="list-group-item bg-transparent border-0 px-0 py-2 d-flex justify-content-between text-muted small">
                            <span>最寄り駅</span>
                            <span class="text-white fw-bold" id="det-station">-</span>
                        </li>
                        <li class="list-group-item bg-transparent border-0 px-0 py-2 d-flex justify-content-between text-muted small">
                            <span>都道府県</span>
                            <span class="text-white fw-bold" id="det-prefecture">-</span>
                        </li>
                        <li class="list-group-item bg-transparent border-0 px-0 py-2 d-flex justify-content-between text-muted small">
                            <span>鉄道会社・路線</span>
                            <span class="text-white fw-bold text-end ms-2" id="det-railway">-</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Career History -->
        <div class="col-md-8">
            <div class="card bg-card border-dark shadow-sm h-100">
                <div class="card-header bg-transparent border-dark px-4 py-3">
                    <h6 class="mb-0 text-white fw-bold"><i class="bi bi-journal-text me-2 text-muted"></i>経歴サマリ</h6>
                </div>
                <div class="card-body p-4">
                    <div class="timeline position-relative border-start border-dark ms-3 ps-4 pb-2" id="det-resume">
                        <div class="text-muted small">経歴情報がありません。</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- AI Match Chat Modal -->
    <div class="modal fade" id="aiMatchModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-card border-dark shadow-lg" style="height: 80vh;">
                <!-- Header -->
                <div class="modal-header border-dark bg-dark align-items-center py-2">
                    <div class="d-flex align-items-center">
                        <div class="avatar bg-accent-purple text-white rounded-circle d-flex justify-content-center align-items-center me-3 shadow-sm" style="width: 40px; height: 40px;">
                            <i class="bi bi-robot fs-5"></i>
                        </div>
                        <div>
                            <h5 class="modal-title text-white fw-bold mb-0 fs-6">AIアシスタント</h5>
                            <div class="small text-muted" style="font-size: 0.75rem;"><span id="chat-eng-name">田中 太郎</span> さんのサポート</div>
                        </div>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <!-- Chat History Area -->
                <div class="modal-body p-4 bg-tertiary overflow-auto" id="chat-history-area">
                    <!-- AI Initial Message -->
                    <div class="d-flex mb-4">
                        <div class="avatar bg-accent-purple text-white rounded-circle d-flex justify-content-center align-items-center me-3 flex-shrink-0" style="width: 32px; height: 32px;">
                            <i class="bi bi-robot"></i>
                        </div>
                        <div class="bg-dark border border-secondary rounded p-3 text-light position-relative" style="max-width: 85%;">
                            <p class="mb-2">こんにちは！AIアシスタントです。<br>エンジニアの最適な案件マッチングや、提案メールの作成をサポートします。何をしますか？</p>
                            <div class="d-flex gap-2 flex-wrap">
                                <button class="btn btn-sm btn-outline-primary border-0 bg-primary bg-opacity-10 text-accent-blue rounded-pill px-3" onclick="requestAiMatch()">
                                    <i class="bi bi-search me-1"></i>案件をマッチング
                                </button>
                                <button class="btn btn-sm btn-outline-info border-0 bg-info bg-opacity-10 text-info rounded-pill px-3" onclick="requestSkillSummary()">
                                    <i class="bi bi-card-text me-1"></i>スキルを要約
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Chat Input Area -->
                <div class="modal-footer border-dark bg-dark flex-column align-items-stretch p-3 gap-2">
                    <!-- Email Template Selector -->
                    <div class="d-flex align-items-center gap-2 mb-1">
                        <span class="badge bg-secondary text-light border border-dark"><i class="bi bi-envelope-paper me-1"></i>提案文作成モード</span>
                        <select class="form-select form-select-sm form-select-dark bg-secondary text-white border-dark" id="chat-template-select" style="width: 250px;">
                            <option value="">(テンプレートを選択...)</option>
                            <!-- JS will load templates -->
                            <option value="1">標準提案メール</option>
                            <option value="2">スキル強調テンプレート</option>
                        </select>
                        <button class="btn btn-sm btn-outline-secondary text-muted hover-text-white border-dark ms-auto" onclick="generateEmailDraft()">
                            <i class="bi bi-magic me-1"></i>選択した雛形で作成
                        </button>
                    </div>
                    
                    <!-- Text Input -->
                    <div class="input-group">
                        <textarea class="form-control form-control-dark bg-secondary text-white border-dark" id="chat-input" rows="1" placeholder="AIへの指示を入力してください... (Enterで送信)" style="resize: none;"></textarea>
                        <button class="btn btn-primary bg-gradient-purple border-0 px-4" type="button" id="chat-send-btn" onclick="sendChatMessage()">
                            <i class="bi bi-send-fill"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="page-js">
    <script th:src="@{/js/modules/engineer-detail.js}"></script>
    <script th:src="@{/js/modules/ai-matching.js}"></script>
    <script th:src="@{/js/modules/ai-skillsheet.js}"></script>
</th:block>

</body>
</html>
