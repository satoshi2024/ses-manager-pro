<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>要員詳細</title>
</head>
<body>

<div layout:fragment="content">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="text-white fw-bold mb-1">
                <i class="bi bi-person-badge me-2 text-accent-blue"></i>
                <span id="eng-name">田中 太郎</span> 
                <span class="fs-6 text-muted ms-2" id="eng-initial">(T.T)</span>
            </h4>
            <p class="text-muted small mb-0">エンジニア詳細情報およびAIマッチング</p>
        </div>
        <div class="d-flex gap-2">
            <a href="/engineer/list" class="btn btn-outline-secondary text-muted hover-text-white border-dark">
                <i class="bi bi-arrow-left me-1"></i>戻る
            </a>
            <button class="btn btn-outline-secondary text-muted hover-text-white border-dark" onclick="generateSkillSheet(currentEngineerId)">
                <i class="bi bi-file-earmark-pdf me-1"></i>スキルシート自動生成
            </button>
            <button class="btn btn-primary bg-gradient-purple border-0 shadow-sm" onclick="showAiMatchModal(currentEngineerId, currentEngineerName)">
                <i class="bi bi-robot me-1"></i>AIマッチング実行
            </button>
        </div>
    </div>

    <div class="row g-4">
        <!-- Profile Card -->
        <div class="col-md-4">
            <div class="card bg-card border-dark shadow-sm h-100">
                <div class="card-body p-4 text-center">
                    <div class="avatar bg-gradient-blue text-white rounded-circle d-flex justify-content-center align-items-center mx-auto mb-3 shadow" style="width: 100px; height: 100px; font-size: 2.5rem;">
                        T.T
                    </div>
                    <h5 class="text-white fw-bold mb-1" id="det-name">名前</h5>
                    <div class="d-flex justify-content-center align-items-center mb-3 gap-3">
                        <div id="det-status"><i class="bi bi-check-circle-fill me-1"></i>ステータス</div>
                        <button class="btn btn-sm btn-outline-info border-0 px-2 py-0" onclick="openSkillModal()" title="スキル編集"><i class="bi bi-pencil"></i></button>
                    </div>
                    
                    <div class="d-flex flex-wrap justify-content-center gap-2 mb-4" id="det-skills">
                        <span class="badge bg-secondary border border-dark text-light">スキルなし</span>
                    </div>

                    <ul class="list-group list-group-flush text-start border-top border-dark pt-3">
                        <li class="list-group-item bg-transparent border-0 px-0 py-2 d-flex justify-content-between text-muted small">
                            <span>経験年数</span>
                            <span class="text-white fw-bold" id="det-experience">-</span>
                        </li>
                        <li class="list-group-item bg-transparent border-0 px-0 py-2 d-flex justify-content-between text-muted small">
                            <span>希望単価</span>
                            <span class="text-white fw-bold" id="det-price">-</span>
                        </li>
                        <li class="list-group-item bg-transparent border-0 px-0 py-2 d-flex justify-content-between text-muted small">
                            <span>最寄り駅</span>
                            <span class="text-white fw-bold" id="det-station">-</span>
                        </li>
                        <li class="list-group-item bg-transparent border-0 px-0 py-2 d-flex justify-content-between text-muted small">
                            <span>都道府県</span>
                            <span class="text-white fw-bold" id="det-prefecture">-</span>
                        </li>
                        <li class="list-group-item bg-transparent border-0 px-0 py-2 d-flex justify-content-between text-muted small">
                            <span>鉄道会社・路線</span>
                            <span class="text-white fw-bold text-end ms-2" id="det-railway">-</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Tabs & Details -->
        <div class="col-md-8">
            <div class="card bg-card border-dark shadow-sm h-100">
                <div class="card-header bg-transparent border-dark px-4 py-3">
                    <ul class="nav nav-tabs card-header-tabs border-dark" id="engineerTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active text-light border-dark bg-dark" id="summary-tab" data-bs-toggle="tab" data-bs-target="#summary-tab-pane" type="button" role="tab" aria-controls="summary-tab-pane" aria-selected="true"><i class="bi bi-journal-text me-2"></i>経歴サマリ</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link text-muted border-transparent hover-text-white" id="career-tab" data-bs-toggle="tab" data-bs-target="#career-tab-pane" type="button" role="tab" aria-controls="career-tab-pane" aria-selected="false"><i class="bi bi-building me-2"></i>経歴詳細</button>
                        </li>
                    </ul>
                </div>
                <div class="card-body p-4">
                    <div class="tab-content" id="engineerTabsContent">
                        <div class="tab-pane fade show active" id="summary-tab-pane" role="tabpanel" aria-labelledby="summary-tab" tabindex="0">
                            <div class="timeline position-relative border-start border-dark ms-3 ps-4 pb-2" id="det-resume">
                                <div class="text-muted small">経歴情報がありません。</div>
                            </div>
                        </div>
                        <div class="tab-pane fade" id="career-tab-pane" role="tabpanel" aria-labelledby="career-tab" tabindex="0">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6 class="mb-0 text-white fw-bold">経歴一覧</h6>
                                <button class="btn btn-sm btn-outline-primary" onclick="openCareerModal()"><i class="bi bi-plus-lg me-1"></i>経歴追加</button>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-dark table-hover align-middle">
                                    <thead>
                                        <tr>
                                            <th>期間</th>
                                            <th>案件名</th>
                                            <th>役割</th>
                                            <th class="text-end">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="career-table-body">
                                        <!-- Populated via JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- AI Match Chat Modal -->
    <div class="modal fade" id="aiMatchModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-card border-dark shadow-lg" style="height: 80vh;">
                <!-- Header -->
                <div class="modal-header border-dark bg-dark align-items-center py-2">
                    <div class="d-flex align-items-center">
                        <div class="avatar bg-accent-purple text-white rounded-circle d-flex justify-content-center align-items-center me-3 shadow-sm" style="width: 40px; height: 40px;">
                            <i class="bi bi-robot fs-5"></i>
                        </div>
                        <div>
                            <h5 class="modal-title text-white fw-bold mb-0 fs-6">AIアシスタント</h5>
                            <div class="small text-muted" style="font-size: 0.75rem;"><span id="chat-eng-name">田中 太郎</span> さんのサポート</div>
                        </div>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <!-- Chat History Area -->
                <div class="modal-body p-4 bg-tertiary overflow-auto" id="chat-history-area">
                    <!-- AI Initial Message -->
                    <div class="d-flex mb-4">
                        <div class="avatar bg-accent-purple text-white rounded-circle d-flex justify-content-center align-items-center me-3 flex-shrink-0" style="width: 32px; height: 32px;">
                            <i class="bi bi-robot"></i>
                        </div>
                        <div class="bg-dark border border-secondary rounded p-3 text-light position-relative" style="max-width: 85%;">
                            <p class="mb-2">こんにちは！AIアシスタントです。<br>エンジニアの最適な案件マッチングや、提案メールの作成をサポートします。何をしますか？</p>
                            <div class="d-flex gap-2 flex-wrap">
                                <button class="btn btn-sm btn-outline-primary border-0 bg-primary bg-opacity-10 text-accent-blue rounded-pill px-3" onclick="requestAiMatch()">
                                    <i class="bi bi-search me-1"></i>案件をマッチング
                                </button>
                                <button class="btn btn-sm btn-outline-info border-0 bg-info bg-opacity-10 text-info rounded-pill px-3" onclick="requestSkillSummary()">
                                    <i class="bi bi-card-text me-1"></i>スキルを要約
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Chat Input Area -->
                <div class="modal-footer border-dark bg-dark flex-column align-items-stretch p-3 gap-2">
                    <!-- Email Template Selector -->
                    <div class="d-flex align-items-center gap-2 mb-1">
                        <span class="badge bg-secondary text-light border border-dark"><i class="bi bi-envelope-paper me-1"></i>提案文作成モード</span>
                        <select class="form-select form-select-sm form-select-dark bg-secondary text-white border-dark" id="chat-template-select" style="width: 250px;">
                            <option value="">(テンプレートを選択...)</option>
                            <!-- JS will load templates -->
                            <option value="1">標準提案メール</option>
                            <option value="2">スキル強調テンプレート</option>
                        </select>
                        <button class="btn btn-sm btn-outline-secondary text-muted hover-text-white border-dark ms-auto" onclick="generateEmailDraft()">
                            <i class="bi bi-magic me-1"></i>選択した雛形で作成
                        </button>
                    </div>
                    
                    <!-- Text Input -->
                    <div class="input-group">
                        <textarea class="form-control form-control-dark bg-secondary text-white border-dark" id="chat-input" rows="1" placeholder="AIへの指示を入力してください... (Enterで送信)" style="resize: none;"></textarea>
                        <button class="btn btn-primary bg-gradient-purple border-0 px-4" type="button" id="chat-send-btn" onclick="sendChatMessage()">
                            <i class="bi bi-send-fill"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Skill Edit Modal -->
    <div class="modal fade" id="skillEditModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-card border-dark shadow-lg">
                <div class="modal-header border-dark bg-dark">
                    <h5 class="modal-title text-white fw-bold"><i class="bi bi-tools me-2 text-info"></i>スキル編集</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="table-responsive">
                        <table class="table table-dark table-bordered align-middle">
                            <thead class="table-dark-header">
                                <tr>
                                    <th style="width: 40%">スキル</th>
                                    <th style="width: 25%">習熟度</th>
                                    <th style="width: 20%">経験年数</th>
                                    <th style="width: 15%" class="text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody id="skill-edit-tbody">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                    <button class="btn btn-sm btn-outline-secondary w-100 mt-2" onclick="addSkillRow()">
                        <i class="bi bi-plus-lg me-1"></i>スキルを追加
                    </button>
                </div>
                <div class="modal-footer border-dark bg-dark">
                    <button type="button" class="btn btn-outline-secondary text-muted hover-text-white border-dark" data-bs-dismiss="modal">キャンセル</button>
                    <button type="button" class="btn btn-primary bg-gradient-blue border-0 shadow-sm px-4" onclick="saveSkills()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Career CRUD Modal -->
    <div class="modal fade" id="careerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-card border-dark shadow-lg">
                <div class="modal-header border-dark bg-dark">
                    <h5 class="modal-title text-white fw-bold"><i class="bi bi-building me-2 text-primary"></i>経歴情報</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="career-form">
                        <input type="hidden" id="car-id">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small">期間(開始) <span class="text-danger">*</span></label>
                                <input type="date" id="car-periodFrom" class="form-control form-control-dark bg-secondary text-white border-dark" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small">期間(終了)</label>
                                <input type="date" id="car-periodTo" class="form-control form-control-dark bg-secondary text-white border-dark">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">案件名 <span class="text-danger">*</span></label>
                            <input type="text" id="car-projectName" class="form-control form-control-dark bg-secondary text-white border-dark" required>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small">顧客業種</label>
                                <input type="text" id="car-clientIndustry" class="form-control form-control-dark bg-secondary text-white border-dark">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small">役割</label>
                                <input type="text" id="car-role" class="form-control form-control-dark bg-secondary text-white border-dark">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">チーム規模 (人)</label>
                            <input type="number" id="car-teamSize" class="form-control form-control-dark bg-secondary text-white border-dark" min="1">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">技術スタック</label>
                            <input type="text" id="car-techStack" class="form-control form-control-dark bg-secondary text-white border-dark" placeholder="Java, Spring, MySQL...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">業務内容・実績</label>
                            <textarea id="car-description" class="form-control form-control-dark bg-secondary text-white border-dark" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-dark bg-dark">
                    <button type="button" class="btn btn-outline-secondary text-muted hover-text-white border-dark" data-bs-dismiss="modal">キャンセル</button>
                    <button type="button" class="btn btn-primary bg-gradient-blue border-0 shadow-sm px-4" onclick="saveCareer()">保存</button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="page-js">
    <script th:src="@{/js/modules/engineer-detail.js}"></script>
    <script th:src="@{/js/modules/ai-matching.js}"></script>
    <script th:src="@{/js/modules/ai-skillsheet.js}"></script>
</th:block>

</body>
</html>
