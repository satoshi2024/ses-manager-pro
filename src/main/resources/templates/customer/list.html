<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>顧客管理 - SES Manager Pro</title>
</head>
<body>
<div layout:fragment="content" class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h3 mb-0 text-light"><i class="bi bi-building me-2 text-info"></i>顧客管理</h2>
        <button class="btn btn-info text-white shadow-sm" data-bs-toggle="modal" data-bs-target="#customerModal">
            <i class="bi bi-plus-lg me-1"></i>新規登録
        </button>
    </div>

    <!-- 検索フィルター -->
    <div class="card bg-card border-dark shadow-sm mb-4">
        <div class="card-body">
            <form action="/customer/list" method="get" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label for="searchCompanyName" class="form-label text-muted small">会社名</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-muted border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control bg-dark border-secondary border-start-0 text-light focus-ring focus-ring-info" id="searchCompanyName" name="companyName" placeholder="株式会社〇〇">
                    </div>
                </div>
                <div class="col-md-3">
                    <label for="searchFlow" class="form-label text-muted small">商流</label>
                    <select class="form-select bg-dark border-secondary text-light" id="searchFlow" name="flow">
                        <option value="">すべて</option>
                        <option value="1">エンド直</option>
                        <option value="2">元請け</option>
                        <option value="3">二次請け</option>
                        <option value="4">それ以降</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="searchRank" class="form-label text-muted small">信頼度</label>
                    <select class="form-select bg-dark border-secondary text-light" id="searchRank" name="rank">
                        <option value="">すべて</option>
                        <option value="S">Sランク (優良)</option>
                        <option value="A">Aランク (良好)</option>
                        <option value="B">Bランク (普通)</option>
                        <option value="C">Cランク (注意)</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-outline-info w-100">
                        <i class="bi bi-filter me-1"></i>絞り込み
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 一覧データテーブル -->
    <div class="card bg-card border-dark shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark table-hover table-striped mb-0 align-middle">
                    <thead class="table-dark-header border-bottom border-dark">
                        <tr>
                            <th scope="col" class="ps-4">会社名</th>
                            <th scope="col">商流</th>
                            <th scope="col">信頼度ランク</th>
                            <th scope="col">担当者</th>
                            <th scope="col">電話番号</th>
                            <th scope="col" class="text-end pe-4">アクション</th>
                        </tr>
                    </thead>
                    <tbody id="customer-table-body">
                        <!-- JS will populate results here -->
                    </tbody>
                </table>
            </div>
            
            <!-- ページネーション -->
            <div class="card-footer border-dark bg-transparent py-3 d-flex justify-content-between align-items-center">
                <div class="text-muted small ps-2">
                    全 128 件中 1-4 件を表示
                </div>
                <nav aria-label="Page navigation">
                    <ul class="pagination pagination-sm mb-0 pe-2">
                        <li class="page-item disabled">
                            <a class="page-link bg-dark border-secondary text-muted" href="#" tabindex="-1" aria-disabled="true"><i class="bi bi-chevron-left"></i></a>
                        </li>
                        <li class="page-item active" aria-current="page">
                            <a class="page-link bg-info border-info text-dark fw-bold" href="#">1</a>
                        </li>
                        <li class="page-item"><a class="page-link bg-dark border-secondary text-light" href="#">2</a></li>
                        <li class="page-item"><a class="page-link bg-dark border-secondary text-light" href="#">3</a></li>
                        <li class="page-item"><a class="page-link bg-dark border-secondary text-light disabled border-0"><span class="bg-transparent border-0 text-muted">...</span></a></li>
                        <li class="page-item"><a class="page-link bg-dark border-secondary text-light" href="#">32</a></li>
                        <li class="page-item">
                            <a class="page-link bg-dark border-secondary text-light" href="#"><i class="bi bi-chevron-right"></i></a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- Customer Registration Modal -->
    <div class="modal fade" id="customerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-card border-dark shadow-lg">
                <div class="modal-header border-dark bg-dark">
                    <h5 class="modal-title text-white fw-bold"><i class="bi bi-building-add me-2 text-info"></i>顧客登録</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="customer-form">
                        <div class="mb-3">
                            <label class="form-label text-muted small">会社名 <span class="text-danger">*</span></label>
                            <input type="text" id="cust-companyName" class="form-control form-control-dark bg-secondary text-white border-dark" placeholder="例: 株式会社〇〇" required>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small">商流</label>
                                <select id="cust-commercialFlow" class="form-select form-select-dark bg-secondary text-white border-dark">
                                    <option value="エンド直">エンド直</option>
                                    <option value="元請け">元請け</option>
                                    <option value="二次請け">二次請け</option>
                                    <option value="それ以降">それ以降</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small">信頼度</label>
                                <select id="cust-trustLevel" class="form-select form-select-dark bg-secondary text-white border-dark">
                                    <option value="S">Sランク (優良)</option>
                                    <option value="A">Aランク (良好)</option>
                                    <option value="B">Bランク (普通)</option>
                                    <option value="C">Cランク (注意)</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">担当者名</label>
                            <input type="text" id="cust-contactPerson" class="form-control form-control-dark bg-secondary text-white border-dark" placeholder="例: 田中 康夫">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">電話番号</label>
                            <input type="text" id="cust-contactPhone" class="form-control form-control-dark bg-secondary text-white border-dark" placeholder="例: 03-1234-5678">
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-dark bg-dark">
                    <button type="button" class="btn btn-outline-secondary text-muted hover-text-white border-dark" data-bs-dismiss="modal">キャンセル</button>
                    <button type="button" class="btn btn-info text-white border-0 shadow-sm px-4" onclick="saveCustomer()">
                        <i class="bi bi-check-lg me-1"></i>登録
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="page-js">
    <script th:src="@{/js/modules/customer.js}"></script>
</th:block>
</body>
</html>
