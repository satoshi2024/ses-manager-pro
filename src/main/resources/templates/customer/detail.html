<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>顧客詳細 - SES Manager Pro</title>
</head>
<body>
<div layout:fragment="content" class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h3 mb-0 text-light">
            <a href="/customer/list" class="text-decoration-none text-muted me-2 hover-text-info"><i class="bi bi-arrow-left"></i></a>
            <i class="bi bi-building me-2 text-info"></i><span id="header-company-name">顧客詳細</span>
        </h2>
        <button class="btn btn-info text-white shadow-sm" data-bs-toggle="modal" data-bs-target="#activityModal">
            <i class="bi bi-plus-lg me-1"></i>活動記録を追加
        </button>
    </div>

    <div class="row mb-4 g-4">
        <!-- 基本情報カード -->
        <div class="col-md-5">
            <div class="card bg-card border-dark shadow-sm h-100">
                <div class="card-header border-dark bg-dark">
                    <h5 class="mb-0 text-light"><i class="bi bi-info-circle me-2"></i>基本情報</h5>
                </div>
                <div class="card-body text-light">
                    <table class="table table-borderless table-dark table-sm mb-0">
                        <tbody>
                            <tr><th style="width: 120px;" class="text-muted">会社名</th><td id="info-companyName">-</td></tr>
                            <tr><th class="text-muted">住所</th><td id="info-address">-</td></tr>
                            <tr><th class="text-muted">商流</th><td id="info-commercialFlow">-</td></tr>
                            <tr><th class="text-muted">信頼度</th><td id="info-trustLevel">-</td></tr>
                            <tr><th class="text-muted">担当者</th><td id="info-contactPerson">-</td></tr>
                            <tr><th class="text-muted">電話番号</th><td id="info-contactPhone">-</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- KPI サマリ -->
        <div class="col-md-7">
            <div class="card bg-card border-dark shadow-sm h-100">
                <div class="card-header border-dark bg-dark">
                    <h5 class="mb-0 text-light"><i class="bi bi-bar-chart me-2"></i>実績サマリ</h5>
                </div>
                <div class="card-body">
                    <div class="row text-center g-3">
                        <div class="col-sm-3">
                            <div class="p-3 bg-dark rounded border border-secondary h-100">
                                <div class="text-muted small mb-1">案件数</div>
                                <div class="fs-4 text-light fw-bold" id="kpi-projectCount">-</div>
                            </div>
                        </div>
                        <div class="col-sm-3">
                            <div class="p-3 bg-dark rounded border border-secondary h-100">
                                <div class="text-muted small mb-1">提案数</div>
                                <div class="fs-4 text-light fw-bold" id="kpi-proposalCount">-</div>
                            </div>
                        </div>
                        <div class="col-sm-3">
                            <div class="p-3 bg-dark rounded border border-secondary h-100">
                                <div class="text-muted small mb-1">成約率</div>
                                <div class="fs-4 text-info fw-bold" id="kpi-winRate">-</div>
                            </div>
                        </div>
                        <div class="col-sm-3">
                            <div class="p-3 bg-dark rounded border border-secondary h-100">
                                <div class="text-muted small mb-1">稼動中契約</div>
                                <div class="fs-4 text-success fw-bold" id="kpi-activeContractCount">-</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 活動タイムライン -->
    <div class="card bg-card border-dark shadow-sm">
        <div class="card-header border-dark bg-dark d-flex justify-content-between align-items-center">
            <h5 class="mb-0 text-light"><i class="bi bi-clock-history me-2"></i>活動タイムライン</h5>
        </div>
        <div class="card-body" id="timeline-container">
            <!-- Timeline items injected by JS -->
        </div>
        <!-- ページネーション -->
        <div class="card-footer border-dark bg-transparent py-3 d-flex justify-content-between align-items-center" id="activity-pagination">
        </div>
    </div>

    <!-- Activity Modal -->
    <div class="modal fade" id="activityModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-card border-dark shadow-lg">
                <div class="modal-header border-dark bg-dark">
                    <h5 class="modal-title text-white fw-bold"><i class="bi bi-pencil-square me-2 text-info"></i>活動記録</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="activity-form">
                        <input type="hidden" id="act-id">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small">活動日 <span class="text-danger">*</span></label>
                                <input type="date" id="act-date" class="form-control form-control-dark bg-secondary text-white border-dark" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small">活動種別 <span class="text-danger">*</span></label>
                                <select id="act-type" class="form-select form-select-dark bg-secondary text-white border-dark" required>
                                    <option value="商談">商談</option>
                                    <option value="訪問">訪問</option>
                                    <option value="電話">電話</option>
                                    <option value="メール">メール</option>
                                    <option value="その他">その他</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">タイトル <span class="text-danger">*</span></label>
                            <input type="text" id="act-title" class="form-control form-control-dark bg-secondary text-white border-dark" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">内容</label>
                            <textarea id="act-content" class="form-control form-control-dark bg-secondary text-white border-dark" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">次回アクション予定日</label>
                            <input type="date" id="act-next-date" class="form-control form-control-dark bg-secondary text-white border-dark">
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-dark bg-dark">
                    <button type="button" class="btn btn-outline-secondary text-muted hover-text-white border-dark" data-bs-dismiss="modal">キャンセル</button>
                    <button type="button" class="btn btn-info text-white border-0 shadow-sm px-4" onclick="saveActivity()">
                        <i class="bi bi-check-lg me-1"></i>保存
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="page-js">
    <script th:src="@{/js/modules/customer-detail.js}"></script>
    <script>
        document.getElementById('activityModal').addEventListener('hidden.bs.modal', function () {
            document.getElementById('activity-form').reset();
            document.getElementById('act-id').value = '';
            document.getElementById('act-date').value = new Date().toISOString().split('T')[0];
        });
        document.getElementById('activityModal').addEventListener('show.bs.modal', function () {
            if (!document.getElementById('act-id').value) {
                document.getElementById('act-date').value = new Date().toISOString().split('T')[0];
            }
        });
    </script>
</th:block>
</body>
</html>
