<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(#{closing.title}, ~{::content}, ~{::script})}">
<head>
    <meta charset="UTF-8">
    <title th:text="#{closing.title}">月次締めチェックリスト</title>
</head>
<body>
<div th:fragment="content">
    <div class="card">
        <div class="card-body">
            <div class="row mb-3 align-items-end">
                <div class="col-md-3">
                    <input type="month" id="closingMonth" class="form-control">
                </div>
                <div class="col-md-6">
                    <button id="btnLoadClosing" class="btn btn-secondary" th:text="#{common.btn.search}">検索</button>
                    <button id="btnConfirmClosing" class="btn btn-success" th:text="#{closing.btn.confirm}">締め完了</button>
                    <button id="btnReopenClosing" class="btn btn-outline-warning d-none" th:text="#{closing.btn.reopen}">締め解除</button>
                </div>
            </div>
            <div id="closedBanner" class="alert alert-info d-none"></div>
            <div id="diffWarning" class="alert alert-warning d-none" th:text="#{closing.status.diffWarning}"></div>
            <div id="closingCards" class="row g-3"></div>
            <div id="closingDetail" class="mt-3"></div>
        </div>
    </div>
</div>

<th:block th:fragment="script">
    <script src="/js/modules/monthly-closing.js"></script>
</th:block>
</body>
</html>
