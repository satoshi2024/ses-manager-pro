<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>稼働率カレンダー - SES Manager Pro</title>
</head>
<body>
    <th:block layout:fragment="page-css">
        <style>
            .timeline-container {
                position: relative;
                height: 600px;
                width: 100%;
                overflow-y: auto;
            }
            .filter-section {
                background-color: var(--bs-tertiary-bg);
                padding: 15px;
                border-radius: 8px;
                border: 1px solid var(--bs-border-color);
                margin-bottom: 20px;
            }
        </style>
    </th:block>

    <div layout:fragment="content" class="container-fluid py-4">
        <h1 class="h3 mb-4 text-light">稼働率カレンダー / ガントチャート</h1>
        
        <div class="filter-section shadow-sm">
            <form id="filterForm" class="row gx-3 gy-2 align-items-center">
                <div class="col-sm-3">
                    <label class="visually-hidden" for="fromMonth">開始月</label>
                    <input type="month" class="form-control bg-dark text-white border-secondary" id="fromMonth" name="from" required>
                </div>
                <div class="col-sm-3">
                    <label class="visually-hidden" for="toMonth">終了月</label>
                    <input type="month" class="form-control bg-dark text-white border-secondary" id="toMonth" name="to" required>
                </div>
                <div class="col-sm-2">
                    <select class="form-select bg-dark text-white border-secondary" id="skillId" name="skillId">
                        <option value="">全てのスキル</option>
                    </select>
                </div>
                <div class="col-sm-2">
                    <select class="form-select bg-dark text-white border-secondary" id="salesUserId" name="salesUserId">
                        <option value="">全ての営業担当</option>
                    </select>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">絞り込み</button>
                    <button type="button" class="btn btn-secondary ms-2" id="filterEndingSoonBtn">30日以内空き</button>
                </div>
            </form>
        </div>

        <div class="card bg-secondary border-dark shadow mb-4">
            <div class="card-header border-dark py-3">
                <h6 class="m-0 fw-bold text-light">エンジニア稼働タイムライン</h6>
            </div>
            <div class="card-body">
                <div class="timeline-container">
                    <canvas id="timelineChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="page-js">
        <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
        <script src="/js/modules/availability-calendar.js"></script>
    </th:block>
</body>
</html>
