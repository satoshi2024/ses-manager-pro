<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(#{invoice.title}, ~{::content}, ~{::script})}">
<head>
    <meta charset="UTF-8">
    <title th:text="#{invoice.title}">請求・支払</title>
</head>
<body>
<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <ul class="nav nav-tabs card-header-tabs" id="invoiceTabs" role="tablist">
                        <li class="nav-item">
                            <a class="nav-link active" id="invoice-tab" data-bs-toggle="tab" href="#invoice" role="tab" aria-controls="invoice" aria-selected="true" th:text="#{invoice.tab.invoice}">請求書</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="bp-payment-tab" data-bs-toggle="tab" href="#bp-payment" role="tab" aria-controls="bp-payment" aria-selected="false" th:text="#{invoice.tab.bpPayment}">BP支払</a>
                        </li>
                    </ul>
                </div>
                <div class="card-body">
                    <div class="tab-content" id="invoiceTabsContent">
                        <!-- 請求書タブ -->
                        <div class="tab-pane fade show active" id="invoice" role="tabpanel" aria-labelledby="invoice-tab">
                            <div class="row mb-3">
                                <div class="col-md-3">
                                    <input type="month" id="billingMonth" class="form-control" th:placeholder="#{invoice.filter.month}">
                                </div>
                                <div class="col-md-3 d-flex align-items-center">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="filterOverdue">
                                        <label class="form-check-label" for="filterOverdue" th:text="#{invoice.filter.overdue}">期限超過のみ</label>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <button id="btnGenerateInvoice" class="btn btn-primary" th:text="#{invoice.btn.generate}">請求書生成</button>
                                </div>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-bordered table-striped" id="invoiceTable">
                                    <thead>
                                        <tr>
                                            <th th:text="#{invoice.table.invoiceNumber}">請求書番号</th>
                                            <th th:text="#{invoice.table.month}">対象月</th>
                                            <th th:text="#{invoice.table.subtotal}">小計</th>
                                            <th th:text="#{invoice.table.tax}">消費税</th>
                                            <th th:text="#{invoice.table.total}">合計</th>
                                            <th th:text="#{invoice.table.status}">ステータス</th>
                                            <th th:text="#{invoice.table.issueDate}">発行日</th>
                                            <th th:text="#{invoice.table.dueDate}">支払期限</th>
                                            <th th:text="#{invoice.table.paymentDate}">入金日</th>
                                            <th th:text="#{invoice.table.actions}">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- BP支払タブ -->
                        <div class="tab-pane fade" id="bp-payment" role="tabpanel" aria-labelledby="bp-payment-tab">
                            <div class="row mb-3">
                                <div class="col-md-3">
                                    <input type="month" id="bpWorkMonth" class="form-control" th:placeholder="#{invoice.filter.month}">
                                </div>
                                <div class="col-md-3">
                                    <button id="btnSearchBpPayment" class="btn btn-secondary" th:text="#{common.btn.search}">検索</button>
                                </div>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-bordered table-striped" id="bpPaymentTable">
                                    <thead>
                                        <tr>
                                            <th th:text="#{invoice.table.month}">対象月</th>
                                            <th th:text="#{invoice.table.engineerName}">要員名</th>
                                            <th th:text="#{invoice.table.projectName}">案件名</th>
                                            <th th:text="#{invoice.table.amount}">金額</th>
                                            <th th:text="#{invoice.table.status}">ステータス</th>
                                            <th th:text="#{invoice.table.paymentDate}">支払日</th>
                                            <th th:text="#{invoice.table.actions}">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 請求書生成モーダル -->
    <div class="modal fade" id="generateModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" th:text="#{invoice.modal.title.generate}">請求書生成</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="generateForm">
                        <div class="mb-3">
                            <label class="form-label" th:text="#{invoice.modal.customerId}">顧客ID</label>
                            <input type="number" class="form-control" name="customerId" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{invoice.modal.billingMonth}">対象月(YYYY-MM)</label>
                            <input type="month" class="form-control" name="billingMonth" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.btn.cancel}">キャンセル</button>
                    <button type="button" class="btn btn-primary" id="btnSubmitGenerate" th:text="#{common.btn.generate}">生成</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 階層追加モーダル -->
    <div class="modal fade" id="bpPaymentLayerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">階層追加</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="bpPaymentLayerForm">
                        <input type="hidden" name="workRecordId">
                        <input type="hidden" name="parentPaymentId">
                        <div class="mb-3">
                            <label class="form-label">階層番号</label>
                            <input type="number" class="form-control" name="layerOrder" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">支払先協力会社名</label>
                            <input type="text" class="form-control" name="payeeCompanyName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">金額(円)</label>
                            <input type="number" class="form-control" name="amount" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">備考</label>
                            <textarea class="form-control" name="remarks"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.cancel}">キャンセル</button>
                    <button type="button" class="btn btn-primary" id="btnSubmitBpPaymentLayer" th:text="#{common.save}">保存</button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:fragment="script">
    <script src="/js/modules/invoice.js"></script>
</th:block>
</body>
</html>
