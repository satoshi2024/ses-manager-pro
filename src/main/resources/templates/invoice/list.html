<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(#{invoice.title}, ~{::content}, ~{::script})}">
<head>
    <meta charset="UTF-8">
    <title th:text="#{invoice.title}">請求・支払</title>
</head>
<body>
<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <ul class="nav nav-tabs card-header-tabs" id="invoiceTabs" role="tablist">
                        <li class="nav-item">
                            <a class="nav-link active" id="invoice-tab" data-bs-toggle="tab" href="#invoice" role="tab" aria-controls="invoice" aria-selected="true" th:text="#{invoice.tab.invoice}">請求書</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="bp-payment-tab" data-bs-toggle="tab" href="#bp-payment" role="tab" aria-controls="bp-payment" aria-selected="false" th:text="#{invoice.tab.bpPayment}">BP支払</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="aging-tab" data-bs-toggle="tab" href="#aging" role="tab" aria-controls="aging" aria-selected="false" th:text="#{invoice.aging.tab}">エイジング</a>
                        </li>
                    </ul>
                </div>
                <div class="card-body">
                    <div class="tab-content" id="invoiceTabsContent">
                        <!-- 請求書タブ -->
                        <div class="tab-pane fade show active" id="invoice" role="tabpanel" aria-labelledby="invoice-tab">
                            <div class="row mb-3">
                                <div class="col-md-3">
                                    <input type="month" id="billingMonth" class="form-control" th:placeholder="#{invoice.filter.month}">
                                </div>
                                <div class="col-md-3 d-flex align-items-center">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="filterOverdue">
                                        <label class="form-check-label" for="filterOverdue" th:text="#{invoice.filter.overdue}">期限超過のみ</label>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <button id="btnGenerateInvoice" class="btn btn-primary" th:text="#{invoice.btn.generate}">請求書生成</button>
                                </div>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-bordered table-striped" id="invoiceTable">
                                    <thead>
                                        <tr>
                                            <th th:text="#{invoice.table.invoiceNumber}">請求書番号</th>
                                            <th th:text="#{invoice.table.month}">対象月</th>
                                            <th th:text="#{invoice.table.subtotal}">小計</th>
                                            <th th:text="#{invoice.table.tax}">消費税</th>
                                            <th th:text="#{invoice.table.total}">合計</th>
                                            <th th:text="#{invoice.table.status}">ステータス</th>
                                            <th th:text="#{invoice.table.issueDate}">発行日</th>
                                            <th th:text="#{invoice.table.dueDate}">支払期限</th>
                                            <th th:text="#{invoice.table.paymentDate}">入金日</th>
                                            <th th:text="#{invoice.table.actions}">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- BP支払タブ -->
                        <div class="tab-pane fade" id="bp-payment" role="tabpanel" aria-labelledby="bp-payment-tab">
                            <div class="row mb-3">
                                <div class="col-md-3">
                                    <input type="month" id="bpWorkMonth" class="form-control" th:placeholder="#{invoice.filter.month}">
                                </div>
                                <div class="col-md-3">
                                    <button id="btnSearchBpPayment" class="btn btn-secondary" th:text="#{common.btn.search}">検索</button>
                                </div>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-bordered table-striped" id="bpPaymentTable">
                                    <thead>
                                        <tr>
                                            <th th:text="#{invoice.table.month}">対象月</th>
                                            <th th:text="#{invoice.table.engineerName}">要員名</th>
                                            <th th:text="#{invoice.table.projectName}">案件名</th>
                                            <th th:text="#{invoice.table.amount}">金額</th>
                                            <th th:text="#{invoice.table.status}">ステータス</th>
                                            <th th:text="#{invoice.table.paymentDate}">支払日</th>
                                            <th th:text="#{invoice.table.actions}">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <!-- エイジングタブ -->
                        <div class="tab-pane fade" id="aging" role="tabpanel" aria-labelledby="aging-tab">
                            <div class="row mb-3 align-items-end">
                                <div class="col-md-3">
                                    <label class="form-label" th:text="#{invoice.aging.asOf}">基準日</label>
                                    <input type="date" id="agingAsOf" class="form-control">
                                </div>
                                <div class="col-md-3">
                                    <button id="btnLoadAging" class="btn btn-secondary" th:text="#{common.btn.search}">検索</button>
                                    <button id="btnExportAging" class="btn btn-outline-success" th:text="#{invoice.aging.export}">Excel出力</button>
                                </div>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-bordered table-striped" id="agingTable">
                                    <thead>
                                        <tr>
                                            <th th:text="#{invoice.aging.customer}">顧客名</th>
                                            <th th:text="#{invoice.aging.unsent}">未請求</th>
                                            <th th:text="#{invoice.aging.notDue}">期限内</th>
                                            <th th:text="#{invoice.aging.d1to30}">1-30日</th>
                                            <th th:text="#{invoice.aging.d31to60}">31-60日</th>
                                            <th th:text="#{invoice.aging.d61to90}">61-90日</th>
                                            <th th:text="#{invoice.aging.d91plus}">91日以上</th>
                                            <th th:text="#{invoice.aging.noDueDate}">期限未設定</th>
                                            <th th:text="#{invoice.aging.balance}">残高計</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                    <tfoot></tfoot>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 入金管理モーダル -->
    <div class="modal fade" id="paymentModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <span th:text="#{invoice.payment.title}">入金管理</span>
                        <small class="text-muted" id="paymentInvoiceNo"></small>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-2">
                        <strong th:text="#{invoice.payment.balance}">残高</strong>:
                        <span id="paymentBalance"></span>
                        <span class="text-success ms-2" id="paymentRemaining"></span>
                    </div>
                    <table class="table table-sm table-bordered" id="paymentHistoryTable">
                        <thead>
                            <tr>
                                <th th:text="#{invoice.payment.paidDate}">入金日</th>
                                <th th:text="#{invoice.payment.amount}">入金額</th>
                                <th th:text="#{invoice.payment.fee}">振込手数料</th>
                                <th th:text="#{invoice.payment.remarks}">備考</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                    <hr>
                    <form id="paymentForm" class="row g-2">
                        <div class="col-md-3">
                            <label class="form-label" th:text="#{invoice.payment.paidDate}">入金日</label>
                            <input type="date" class="form-control" name="paidDate" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" th:text="#{invoice.payment.amount}">入金額</label>
                            <input type="number" class="form-control" name="amount" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label" th:text="#{invoice.payment.fee}">手数料</label>
                            <input type="number" class="form-control" name="fee" value="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label" th:text="#{invoice.payment.remarks}">備考</label>
                            <input type="text" class="form-control" name="remarks">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.btn.cancel}">閉じる</button>
                    <button type="button" class="btn btn-primary" id="btnSubmitPayment" th:text="#{invoice.payment.add}">入金を追加</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 督促メールモーダル -->
    <div class="modal fade" id="reminderModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <span th:text="#{invoice.reminder.title}">督促メール</span>
                        <small class="text-muted" id="reminderInvoiceNo"></small>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label" th:text="#{invoice.reminder.selectTemplate}">テンプレートを選択</label>
                    <select id="reminderTemplate" class="form-select"></select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.btn.cancel}">キャンセル</button>
                    <button type="button" class="btn btn-primary" id="btnSubmitReminder" th:text="#{invoice.reminder.send}">送信</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 請求書生成モーダル -->
    <div class="modal fade" id="generateModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" th:text="#{invoice.modal.title.generate}">請求書生成</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="generateForm">
                        <div class="mb-3">
                            <label class="form-label" th:text="#{invoice.modal.customerId}">顧客ID</label>
                            <input type="number" class="form-control" name="customerId" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{invoice.modal.billingMonth}">対象月(YYYY-MM)</label>
                            <input type="month" class="form-control" name="billingMonth" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.btn.cancel}">キャンセル</button>
                    <button type="button" class="btn btn-primary" id="btnSubmitGenerate" th:text="#{common.btn.generate}">生成</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 階層追加モーダル -->
    <div class="modal fade" id="bpPaymentLayerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">階層追加</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="bpPaymentLayerForm">
                        <input type="hidden" name="workRecordId">
                        <input type="hidden" name="parentPaymentId">
                        <div class="mb-3">
                            <label class="form-label">階層番号</label>
                            <input type="number" class="form-control" name="layerOrder" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">支払先協力会社名</label>
                            <input type="text" class="form-control" name="payeeCompanyName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">金額(円)</label>
                            <input type="number" class="form-control" name="amount" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">備考</label>
                            <textarea class="form-control" name="remarks"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.cancel}">キャンセル</button>
                    <button type="button" class="btn btn-primary" id="btnSubmitBpPaymentLayer" th:text="#{common.save}">保存</button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:fragment="script">
    <script src="/js/modules/invoice.js"></script>
</th:block>
</body>
</html>
