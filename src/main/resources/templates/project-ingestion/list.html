<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="#{projectIngestion.title} + ' - ' + #{app.name}">案件メール取込 - SES Manager Pro</title>
</head>
<body>
<div layout:fragment="content" class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0 text-light"><i class="bi bi-envelope-open me-2 text-primary"></i><span th:text="#{projectIngestion.title}">案件メール取込</span></h1>
        <div>
            <button class="btn btn-secondary shadow-sm me-2" id="btn-paste">
                <i class="bi bi-clipboard me-1"></i>テキスト貼付
            </button>
            <button class="btn btn-primary shadow-sm" id="btn-upload">
                <i class="bi bi-upload me-1"></i>emlアップロード
            </button>
        </div>
    </div>

    <!-- フィルター -->
    <div class="card bg-card border-dark shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label for="filterStatus" class="form-label text-muted small" th:text="#{projectIngestion.status}">ステータス</label>
                    <select id="filterStatus" class="form-select bg-dark border-secondary text-light">
                        <option value="" th:text="#{common.all}"></option>
                        <option value="取込待ち">取込待ち</option>
                        <option value="抽出中">抽出中</option>
                        <option value="要確認">要確認</option>
                        <option value="確定済">確定済</option>
                        <option value="却下">却下</option>
                        <option value="失敗">失敗</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="button" class="btn btn-outline-primary w-100" onclick="loadList(1)">
                        <i class="bi bi-filter me-1"></i><th:block th:text="#{common.filter}"></th:block>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 一覧 -->
    <div class="card bg-card border-dark shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark table-hover table-striped mb-0 align-middle">
                    <thead class="table-dark-header border-bottom border-dark">
                        <tr>
                            <th scope="col" class="ps-4">種別 / ファイル名</th>
                            <th scope="col" th:text="#{projectIngestion.status}">ステータス</th>
                            <th scope="col" th:text="#{projectIngestion.createdAt}">作成日時</th>
                            <th scope="col" class="text-end pe-4" th:text="#{common.actions}">アクション</th>
                        </tr>
                    </thead>
                    <tbody id="pi-table-body">
                    </tbody>
                </table>
            </div>
            <div class="card-footer border-dark bg-transparent py-3 d-flex justify-content-between align-items-center" id="pi-pagination"></div>
        </div>
    </div>

    <!-- アップロードモーダル -->
    <div class="modal fade" id="uploadModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-card text-white border-dark">
                <div class="modal-header border-dark">
                    <h5 class="modal-title">emlアップロード</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="emlFile" class="form-label text-muted small">ファイル</label>
                        <input type="file" id="emlFile" class="form-control bg-dark border-secondary text-light" accept=".eml,.txt">
                        <div class="form-text text-muted small">EML / TXT 形式</div>
                    </div>
                </div>
                <div class="modal-footer border-dark">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.cancel}"></button>
                    <button type="button" class="btn btn-primary" id="btn-do-upload">アップロード</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 貼付モーダル -->
    <div class="modal fade" id="pasteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-card text-white border-dark">
                <div class="modal-header border-dark">
                    <h5 class="modal-title">テキスト貼付</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="pasteText" class="form-label text-muted small">メール本文などを貼り付け</label>
                        <textarea id="pasteText" class="form-control bg-dark border-secondary text-light" rows="10"></textarea>
                    </div>
                </div>
                <div class="modal-footer border-dark">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.cancel}"></button>
                    <button type="button" class="btn btn-primary" id="btn-do-paste">取込開始</button>
                </div>
            </div>
        </div>
    </div>
</div>
<th:block layout:fragment="page-js">
    <script th:src="@{/js/modules/project-ingestion.js}" defer></script>
</th:block>
</body>
</html>
