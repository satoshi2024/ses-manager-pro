<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" data-bs-theme="light" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE | $LAYOUT_TITLE" th:text="#{app.title}">SES Manager Pro</title>
    
    <!-- Fonts: Noto Sans JP/SC/KR (多言語フォールバック対応) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom CSS -->
    <link th:href="@{/css/common.css}" rel="stylesheet">
    
    <!-- Theme Initialization Script to prevent FOUC (Flash of Unstyled Content) -->
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('ses_theme') || 'light';
                document.documentElement.setAttribute('data-bs-theme', theme);
            } catch (e) {}
        })();
    </script>
    
    <!-- Additional CSS from specific pages -->
    <th:block layout:fragment="page-css"></th:block>
</head>
<body>
    
    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1060; pointer-events: none;"></div>

    <!-- Password Change Modal -->
    <div class="modal fade" id="passwordChangeModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-secondary text-white border-dark">
                <div class="modal-header border-dark">
                    <h5 class="modal-title fw-bold" th:text="#{common.password.change}">パスワード変更</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="pw-current" class="form-label text-muted small" th:text="#{common.password.current}">現在のパスワード</label>
                        <input type="password" class="form-control bg-dark text-white border-secondary" id="pw-current" autocomplete="current-password">
                    </div>
                    <div class="mb-3">
                        <label for="pw-new" class="form-label text-muted small" th:text="#{common.password.new}">新しいパスワード</label>
                        <input type="password" class="form-control bg-dark text-white border-secondary" id="pw-new" autocomplete="new-password">
                    </div>
                    <div class="mb-3">
                        <label for="pw-confirm" class="form-label text-muted small" th:text="#{common.password.confirmNew}">新しいパスワード(確認)</label>
                        <input type="password" class="form-control bg-dark text-white border-secondary" id="pw-confirm" autocomplete="new-password">
                    </div>
                </div>
                <div class="modal-footer border-dark">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" th:text="#{common.cancel}">キャンセル</button>
                    <button type="button" class="btn btn-primary bg-gradient-blue border-0" id="btn-save-password" th:text="#{common.save}">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div class="app-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" th:replace="~{layout/sidebar :: sidebar}"></aside>

        <!-- Mobile Sidebar Backdrop -->
        <div class="sidebar-backdrop no-print" id="sidebar-backdrop"></div>

        <!-- Main Content Wrapper -->
        <div class="main-wrapper">
            <!-- Header -->
            <header th:replace="~{layout/header :: header}"></header>
            
            <!-- Page Content -->
            <main class="content-area p-4">
                <div layout:fragment="content">
                    <!-- Page specific content goes here -->
                </div>
            </main>
            
            <!-- Footer -->
            <footer class="footer mt-auto py-3 px-4 text-muted text-end">
                <small th:text="#{footer.copyright}">&copy; 2026 SES Manager Pro</small>
            </footer>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Bootstrap JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- SweetAlert2 -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.7/dist/sweetalert2.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.7/dist/sweetalert2.all.min.js"></script>
    
    <!-- Chart.js (Loaded globally for convenience, used mainly in dashboard) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Custom JS -->
    <script th:src="@{/js/i18n.js(lang=${#locale.toLanguageTag()})}"></script>
    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/profile.js}"></script>
    
    <!-- Additional JS from specific pages -->
    <th:block layout:fragment="page-js"></th:block>

</body>
</html>
