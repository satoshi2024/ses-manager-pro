<!DOCTYPE html>
<html lang="ja" data-bs-theme="light" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE | $LAYOUT_TITLE" th:text="#{app.title}">SES Manager Pro</title>
    
    <!-- Fonts: Noto Sans JP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom CSS -->
    <link th:href="@{/css/common.css}" rel="stylesheet">
    
    <!-- Theme Initialization Script to prevent FOUC (Flash of Unstyled Content) -->
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('ses_theme') || 'light';
                document.documentElement.setAttribute('data-bs-theme', theme);
            } catch (e) {}
        })();
    </script>
    
    <!-- Additional CSS from specific pages -->
    <th:block layout:fragment="page-css"></th:block>
</head>
<body>
    
    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1060; pointer-events: none;"></div>

    <div class="app-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" th:replace="~{layout/sidebar :: sidebar}"></aside>

        <!-- Mobile Sidebar Backdrop -->
        <div class="sidebar-backdrop no-print" id="sidebar-backdrop"></div>

        <!-- Main Content Wrapper -->
        <div class="main-wrapper">
            <!-- Header -->
            <header th:replace="~{layout/header :: header}"></header>
            
            <!-- Page Content -->
            <main class="content-area p-4">
                <div layout:fragment="content">
                    <!-- Page specific content goes here -->
                </div>
            </main>
            
            <!-- Footer -->
            <footer class="footer mt-auto py-3 px-4 text-muted text-end">
                <small>&copy; 2026 SES Manager Pro</small>
            </footer>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Bootstrap JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- SweetAlert2 -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.7/dist/sweetalert2.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.7/dist/sweetalert2.all.min.js"></script>
    
    <!-- Chart.js (Loaded globally for convenience, used mainly in dashboard) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Custom JS -->
    <script th:src="@{/js/common.js}"></script>
    
    <!-- Additional JS from specific pages -->
    <th:block layout:fragment="page-js"></th:block>

</body>
</html>
