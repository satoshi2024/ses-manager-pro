<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <header th:fragment="header" class="top-header sticky-top bg-primary border-bottom border-dark d-flex align-items-center px-4 py-2 transition-base no-print">
        
        <!-- Mobile Toggle Button -->
        <button class="btn btn-link text-secondary hover-text-white d-lg-none me-3 p-0 border-0" id="sidebar-toggle-btn">
            <i class="bi bi-list fs-3"></i>
        </button>

        <!-- Breadcrumb Area (Dynamic based on page title if needed, placeholder for now) -->
        <div class="breadcrumb-area flex-grow-1 d-none d-md-block">
            <h5 class="mb-0 text-white fw-bold page-title-header">
               <!-- Will be populated by JS or Thymeleaf page fragments -->
            </h5>
        </div>

        <!-- Right Side Tools -->
        <div class="header-tools d-flex align-items-center ms-auto gap-3">
            
            <!-- Current Date/Time -->
            <div class="datetime-display d-none d-lg-block text-muted small me-2" id="header-datetime">
                <!-- Populated by JS -->
                2026年07月10日 (金) 19:00
            </div>

            <!-- Language Switch -->
            <div class="dropdown">
                <button class="btn btn-link text-secondary hover-text-white p-1 border-0" type="button" id="languageDropdown" data-bs-toggle="dropdown" aria-expanded="false" th:title="#{common.language.switch}">
                    <i class="bi bi-globe2 fs-5"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark bg-secondary border-dark shadow-lg" aria-labelledby="languageDropdown">
                    <li>
                        <a class="dropdown-item py-2" th:href="${langSwitchBase} + 'ja'" th:classappend="${#locale.toLanguageTag() == 'ja' ? 'active' : ''}">日本語</a>
                    </li>
                    <li>
                        <a class="dropdown-item py-2" th:href="${langSwitchBase} + 'en'" th:classappend="${#locale.toLanguageTag() == 'en' ? 'active' : ''}">English</a>
                    </li>
                    <li>
                        <a class="dropdown-item py-2" th:href="${langSwitchBase} + 'zh-CN'" th:classappend="${#locale.toLanguageTag() == 'zh-CN' ? 'active' : ''}">简体中文</a>
                    </li>
                    <li>
                        <a class="dropdown-item py-2" th:href="${langSwitchBase} + 'ko'" th:classappend="${#locale.toLanguageTag() == 'ko' ? 'active' : ''}">한국어</a>
                    </li>
                </ul>
            </div>

            <!-- Theme Toggle -->
            <button class="btn btn-link text-secondary hover-text-white p-1 border-0" type="button" id="theme-toggle-btn" data-bs-toggle="tooltip" data-bs-placement="bottom" th:title="#{tooltip.themeToggle}">
                <i class="bi bi-sun fs-5 d-none" id="theme-icon-light"></i>
                <i class="bi bi-moon-stars fs-5" id="theme-icon-dark"></i>
            </button>

            <!-- Notifications -->
            <div class="dropdown">
                <button class="btn btn-link text-secondary hover-text-white p-1 position-relative border-0" type="button" id="notificationDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-bell fs-5"></i>
                    <span id="notification-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-accent-red" style="display: none; font-size: 0.65rem; padding: 0.25em 0.4em;">
                        0
                        <span class="visually-hidden">unread messages</span>
                    </span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark bg-secondary border-dark shadow-lg" aria-labelledby="notificationDropdown" style="width: 300px; max-width: calc(100vw - 2rem);">
                    <li><h6 class="dropdown-header text-white border-bottom border-dark pb-2" th:text="#{notification.title}">通知</h6></li>
                    <li id="notification-list">
                        <!-- JSにより動的生成。ロード中/空/エラー時のメッセージもここに描画 -->
                        <span class="dropdown-item-text text-muted small py-2" th:text="#{common.loading}">読み込み中...</span>
                    </li>
                    <li><hr class="dropdown-divider border-dark"></li>
                    <li><a class="dropdown-item text-center small text-muted hover-text-white" href="#" th:text="#{notification.viewAll}">すべての通知を見る</a></li>
                </ul>
            </div>

            <!-- Quick Add Dropdown -->
            <div class="dropdown">
                <button class="btn btn-primary btn-sm rounded-pill shadow-sm bg-gradient-blue border-0 px-3 py-1 dropdown-toggle" type="button" id="quickAddDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-plus-lg me-1"></i><span class="quick-add-label" th:text="#{common.create}">新規作成</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark bg-secondary border-dark shadow-lg" aria-labelledby="quickAddDropdown">
                    <li><a class="dropdown-item py-2" href="/engineer/list"><i class="bi bi-person-plus me-2 text-accent-blue"></i><span th:text="#{quickAdd.engineer}">要員を登録</span></a></li>
                    <li><a class="dropdown-item py-2" href="/project/list"><i class="bi bi-briefcase me-2 text-success"></i><span th:text="#{quickAdd.project}">案件を登録</span></a></li>
                    <li><a class="dropdown-item py-2" href="/customer/list"><i class="bi bi-building-add me-2 text-info"></i><span th:text="#{quickAdd.customer}">顧客を登録</span></a></li>
                    <li><hr class="dropdown-divider border-dark"></li>
                    <li><a class="dropdown-item py-2" href="/proposal/kanban"><i class="bi bi-kanban me-2 text-accent-purple"></i><span th:text="#{quickAdd.proposal}">提案を作成</span></a></li>
                    <li><a class="dropdown-item py-2" href="/contract/list"><i class="bi bi-file-earmark-plus me-2 text-accent-green"></i><span th:text="#{quickAdd.contract}">契約を作成</span></a></li>
                </ul>
            </div>

            <!-- Profile Menu -->
            <div class="dropdown">
                <button class="btn btn-link text-secondary hover-text-white p-1 border-0 dropdown-toggle" type="button" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-person-circle fs-5"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark bg-secondary border-dark shadow-lg" aria-labelledby="profileDropdown">
                    <li><a class="dropdown-item py-2" href="#" id="open-password-modal"><i class="bi bi-key me-2 text-warning"></i><span th:text="#{common.password.change}">パスワード変更</span></a></li>
                </ul>
            </div>

        </div>
    </header>
</body>
</html>
