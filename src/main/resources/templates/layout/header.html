<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <header th:fragment="header" class="top-header sticky-top bg-primary border-bottom border-dark d-flex align-items-center px-4 py-2 transition-base no-print">
        
        <!-- Mobile Toggle Button -->
        <button class="btn btn-link text-white d-lg-none me-3 p-0 border-0" id="sidebar-toggle-btn">
            <i class="bi bi-list fs-3"></i>
        </button>

        <!-- Breadcrumb Area (Dynamic based on page title if needed, placeholder for now) -->
        <div class="breadcrumb-area flex-grow-1 d-none d-md-block">
            <h5 class="mb-0 text-white fw-bold page-title-header">
               <!-- Will be populated by JS or Thymeleaf page fragments -->
            </h5>
        </div>

        <!-- Right Side Tools -->
        <div class="header-tools d-flex align-items-center ms-auto gap-3">
            
            <!-- Current Date/Time -->
            <div class="datetime-display d-none d-lg-block text-muted small me-2" id="header-datetime">
                <!-- Populated by JS -->
                2026年07月10日 (金) 19:00
            </div>

            <!-- Notifications -->
            <div class="dropdown">
                <button class="btn btn-link text-secondary hover-text-white p-1 position-relative border-0" type="button" id="notificationDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-bell fs-5"></i>
                    <span id="notification-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-accent-red" style="display: none; font-size: 0.65rem; padding: 0.25em 0.4em;">
                        0
                        <span class="visually-hidden">unread messages</span>
                    </span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark bg-secondary border-dark shadow-lg" aria-labelledby="notificationDropdown" style="width: 300px; max-width: calc(100vw - 2rem);">
                    <li><h6 class="dropdown-header text-white border-bottom border-dark pb-2">通知</h6></li>
                    <li id="notification-list">
                        <!-- JSにより動的生成。ロード中/空/エラー時のメッセージもここに描画 -->
                        <span class="dropdown-item-text text-muted small py-2">読み込み中...</span>
                    </li>
                    <li><hr class="dropdown-divider border-dark"></li>
                    <li><a class="dropdown-item text-center small text-muted hover-text-white" href="#">すべての通知を見る</a></li>
                </ul>
            </div>

            <!-- Quick Add Dropdown -->
            <div class="dropdown">
                <button class="btn btn-primary btn-sm rounded-pill shadow-sm bg-gradient-blue border-0 px-3 py-1 dropdown-toggle" type="button" id="quickAddDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-plus-lg me-1"></i><span class="quick-add-label">新規作成</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark bg-secondary border-dark shadow-lg" aria-labelledby="quickAddDropdown">
                    <li><a class="dropdown-item py-2" href="/engineer/list"><i class="bi bi-person-plus me-2 text-accent-blue"></i>要員を登録</a></li>
                    <li><a class="dropdown-item py-2" href="/project/list"><i class="bi bi-briefcase me-2 text-success"></i>案件を登録</a></li>
                    <li><a class="dropdown-item py-2" href="/customer/list"><i class="bi bi-building-add me-2 text-info"></i>顧客を登録</a></li>
                    <li><hr class="dropdown-divider border-dark"></li>
                    <li><a class="dropdown-item py-2" href="/proposal/kanban"><i class="bi bi-kanban me-2 text-accent-purple"></i>提案を作成</a></li>
                    <li><a class="dropdown-item py-2" href="/contract/list"><i class="bi bi-file-earmark-plus me-2 text-accent-green"></i>契約を作成</a></li>
                </ul>
            </div>

        </div>
    </header>
</body>
</html>
