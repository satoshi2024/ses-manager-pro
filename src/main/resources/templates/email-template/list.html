<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>メールテンプレート管理</title>
</head>
<body>

<div layout:fragment="content">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="text-white fw-bold mb-1"><i class="bi bi-envelope-paper me-2 text-accent-blue"></i>メールテンプレート管理</h4>
            <p class="text-muted small mb-0">提案・面接依頼・フォローアップなどの定型文管理</p>
        </div>
        <div>
            <button class="btn btn-primary bg-gradient-blue border-0 shadow-sm rounded-pill px-3" onclick="showTemplateModal()">
                <i class="bi bi-plus-lg me-1"></i>新規テンプレート
            </button>
        </div>
    </div>

    <!-- Table -->
    <div class="card bg-card border-dark shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark table-hover table-striped mb-0 align-middle">
                    <thead class="table-secondary border-dark">
                        <tr>
                            <th class="px-4 py-3 text-muted small text-uppercase" style="width: 25%;">テンプレート名</th>
                            <th class="py-3 text-muted small text-uppercase" style="width: 15%;">種類</th>
                            <th class="py-3 text-muted small text-uppercase" style="width: 45%;">件名</th>
                            <th class="px-4 py-3 text-end text-muted small text-uppercase" style="width: 15%;">操作</th>
                        </tr>
                    </thead>
                    <tbody class="border-top-0" id="template-table-body">
                        <!-- JS renders this -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal for Create/Edit -->
    <div class="modal fade" id="templateModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-card border-dark shadow-lg">
                <div class="modal-header border-dark bg-dark">
                    <h5 class="modal-title text-white fw-bold" id="modal-title">テンプレート編集</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="template-form">
                        <input type="hidden" name="id" id="template-id">
                        
                        <div class="row g-3 mb-3">
                            <div class="col-md-8">
                                <label class="form-label text-muted small">テンプレート名 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-dark bg-secondary text-white border-dark" id="template-name" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-muted small">種類 <span class="text-danger">*</span></label>
                                <select class="form-select form-select-dark bg-secondary text-white border-dark" id="template-type" required>
                                    <option value="提案">提案</option>
                                    <option value="面接依頼">面接依頼</option>
                                    <option value="お礼">お礼</option>
                                    <option value="フォローアップ">フォローアップ</option>
                                    <option value="その他">その他</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted small">件名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-dark bg-secondary text-white border-dark" id="subject-template" required>
                            <div class="form-text text-muted small mt-1">利用可能な変数: {customer_name}, {engineer_name}, {project_name}</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted small">本文 <span class="text-danger">*</span></label>
                            <textarea class="form-control form-control-dark bg-secondary text-white border-dark font-monospace" id="body-template" rows="10" required></textarea>
                            <div class="form-text text-muted small mt-1">
                                利用可能な変数: {customer_name}, {engineer_name}, {project_name}, {sender_name}
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-dark bg-dark">
                    <button type="button" class="btn btn-outline-secondary text-muted hover-text-white border-dark" data-bs-dismiss="modal">キャンセル</button>
                    <button type="button" class="btn btn-primary bg-gradient-blue border-0 shadow-sm px-4" onclick="saveTemplate()">
                        <i class="bi bi-check-lg me-1"></i>保存
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="page-js">
    <script th:src="@{/js/modules/email-template.js}"></script>
</th:block>

</body>
</html>
