<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>入金消込 - SES Manager Pro</title>
</head>
<body>
<div layout:fragment="content" class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h3 mb-0 text-light">
            <i class="bi bi-cash-coin me-2 text-warning"></i>入金消込
        </h2>
    </div>

    <div class="card bg-secondary border-dark mb-4 shadow-sm">
        <div class="card-body">
            <div class="row align-items-end g-3">
                <div class="col-md-3">
                    <label for="fromDate" class="form-label text-light small fw-bold">取得期間（開始）</label>
                    <input type="date" id="fromDate" class="form-control bg-dark text-white border-secondary">
                </div>
                <div class="col-md-3">
                    <label for="toDate" class="form-label text-light small fw-bold">取得期間（終了）</label>
                    <input type="date" id="toDate" class="form-control bg-dark text-white border-secondary">
                </div>
                <div class="col-md-6 text-md-end">
                    <button type="button" id="btnFetch" class="btn btn-primary bg-gradient-blue border-0">
                        <i class="bi bi-cloud-download me-1"></i>freeeから入金取得
                    </button>
                </div>
            </div>
            <div id="fetchSummary" class="mt-3 text-light small" style="display:none;"></div>
        </div>
    </div>

    <div class="card bg-secondary border-dark shadow-sm">
        <div class="card-header bg-dark border-dark text-light fw-bold">
            <i class="bi bi-list-check me-2"></i>未消込の入金一覧
        </div>
        <div class="table-responsive">
            <table class="table table-dark table-hover mb-0 align-middle">
                <thead class="table-dark">
                <tr>
                    <th>入金日</th>
                    <th class="text-end">金額</th>
                    <th>入金者名</th>
                    <th>状態</th>
                    <th>候補請求書 / 操作</th>
                </tr>
                </thead>
                <tbody id="pendingTableBody">
                <tr><td colspan="5" class="text-center text-muted py-4">読み込み中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<th:block layout:fragment="page-js">
    <script th:src="@{/js/modules/reconciliation.js}"></script>
</th:block>
</body>
</html>
