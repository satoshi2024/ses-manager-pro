<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="#{project.list.header} + ' - ' + #{app.name}">案件管理 - SES Manager Pro</title>
</head>
<body>
<div layout:fragment="content" class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h3 mb-0 text-light"><i class="bi bi-briefcase me-2 text-success"></i><th:block th:text="#{project.list.header}">案件管理</th:block></h2>
        <button class="btn btn-success shadow-sm" data-bs-toggle="modal" data-bs-target="#projectModal">
            <i class="bi bi-plus-lg me-1"></i><th:block th:text="#{common.register_new}">新規登録</th:block>
        </button>
    </div>

    <!-- 検索フィルター -->
    <div class="card bg-card border-dark shadow-sm mb-4">
        <div class="card-body">
            <form id="searchForm" onsubmit="event.preventDefault(); loadProjects(1);" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label for="searchProjectName" class="form-label text-muted small" th:text="#{project.search.name}">案件名</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-muted border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control bg-dark border-secondary border-start-0 text-light focus-ring focus-ring-success" id="searchProjectName" name="projectName" th:placeholder="#{project.search.name.placeholder}" placeholder="金融系システム移行など" list="project-list">
                        <datalist id="project-list"></datalist>
                    </div>
                </div>
                <div class="col-md-3">
                    <label for="searchCustomer" class="form-label text-muted small" th:text="#{project.search.customer}">顧客</label>
                    <input type="text" class="form-control bg-dark border-secondary text-light" id="searchCustomer" name="customer" th:placeholder="#{project.search.customer.placeholder}" placeholder="会社名" list="customer-list">
                    <datalist id="customer-list"></datalist>
                </div>
                <div class="col-md-3">
                    <label for="searchStatus" class="form-label text-muted small" th:text="#{project.search.status}">ステータス</label>
                    <select class="form-select bg-dark border-secondary text-light" id="searchStatus" name="status">
                        <option value="" th:text="#{common.all}">すべて</option>
                        <option value="募集中" th:text="#{project.status.open}">募集中</option>
                        <option value="選考中" th:text="#{project.status.interviewing}">面談調整中 (選考中)</option>
                        <option value="充足" th:text="#{project.status.filled_detail}">参画決定 (充足)</option>
                        <option value="クローズ" th:text="#{project.status.closed}">クローズ</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-outline-success w-100">
                        <i class="bi bi-filter me-1"></i><th:block th:text="#{common.filter}">絞り込み</th:block>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 一覧データテーブル -->
    <div class="card bg-card border-dark shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark table-hover table-striped mb-0 align-middle">
                    <thead class="table-dark-header border-bottom border-dark">
                        <tr>
                            <th scope="col" class="ps-4" th:text="#{project.table.name}">案件名</th>
                            <th scope="col" th:text="#{project.table.customer}">顧客</th>
                            <th scope="col" th:text="#{project.table.price}">単価(下限-上限)</th>
                            <th scope="col" class="text-center" th:text="#{project.table.required_count}">募集人数</th>
                            <th scope="col" class="text-center" th:text="#{project.table.remote}">リモート</th>
                            <th scope="col" th:text="#{project.table.required_skills}">要求スキル</th>
                            <th scope="col" th:text="#{project.table.status}">ステータス</th>
                            <th scope="col" class="text-end pe-4" th:text="#{common.actions}">アクション</th>
                        </tr>
                    </thead>
                    <tbody id="project-table-body">
                        <!-- JS will populate results here -->
                    </tbody>
                </table>
            </div>
            
            <!-- ページネーション -->
            <div class="card-footer border-dark bg-transparent py-3 d-flex justify-content-between align-items-center">
                <div class="text-muted small ps-2">
                    全 24 件中 1-4 件を表示
                </div>
                <nav aria-label="Page navigation">
                    <ul class="pagination pagination-sm mb-0 pe-2">
                        <li class="page-item disabled">
                            <a class="page-link bg-dark border-secondary text-muted" href="#" tabindex="-1" aria-disabled="true"><i class="bi bi-chevron-left"></i></a>
                        </li>
                        <li class="page-item active" aria-current="page">
                            <a class="page-link bg-success border-success text-white" href="#">1</a>
                        </li>
                        <li class="page-item"><a class="page-link bg-dark border-secondary text-light" href="#">2</a></li>
                        <li class="page-item"><a class="page-link bg-dark border-secondary text-light" href="#">3</a></li>
                        <li class="page-item"><a class="page-link bg-dark border-secondary text-light disabled border-0"><span class="bg-transparent border-0 text-muted">...</span></a></li>
                        <li class="page-item"><a class="page-link bg-dark border-secondary text-light" href="#">6</a></li>
                        <li class="page-item">
                            <a class="page-link bg-dark border-secondary text-light" href="#"><i class="bi bi-chevron-right"></i></a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- Project Registration Modal -->
    <div class="modal fade" id="projectModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-card border-dark shadow-lg">
                <div class="modal-header border-dark bg-dark">
                    <h5 class="modal-title text-white fw-bold"><i class="bi bi-briefcase me-2 text-success"></i><th:block th:text="#{project.modal.title}">案件登録</th:block></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="project-form">
                        <input type="hidden" id="proj-id">
                        <div class="mb-3">
                            <label class="form-label text-muted small"><th:block th:text="#{project.modal.name}">案件名</th:block> <span class="text-danger">*</span></label>
                            <input type="text" id="proj-projectName" class="form-control form-control-dark bg-secondary text-white border-dark" th:placeholder="#{project.modal.name.placeholder}" placeholder="例: 〇〇システム開発" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small" th:text="#{project.modal.customer}">顧客</label>
                            <select id="proj-customerId" class="form-select form-select-dark bg-secondary text-white border-dark">
                                <option value="" th:text="#{project.modal.customer.placeholder}">システム登録済みの顧客を選択...</option>
                                <!-- JS will populate customers -->
                            </select>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small" th:text="#{project.modal.price_min}">単価下限 (円)</label>
                                <input type="number" id="proj-unitPriceMin" class="form-control form-control-dark bg-secondary text-white border-dark" th:placeholder="#{project.modal.price_min.placeholder}" placeholder="例: 600000" min="0">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small" th:text="#{project.modal.price_max}">単価上限 (円)</label>
                                <input type="number" id="proj-unitPriceMax" class="form-control form-control-dark bg-secondary text-white border-dark" th:placeholder="#{project.modal.price_max.placeholder}" placeholder="例: 800000" min="0">
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small" th:text="#{project.modal.remote}">リモート区分</label>
                                <select id="proj-remoteType" class="form-select form-select-dark bg-secondary text-white border-dark">
                                    <option value="フル出社" th:text="#{project.modal.remote.none}">フル出社</option>
                                    <option value="ハイブリッド" th:text="#{project.modal.remote.hybrid}">一部リモート</option>
                                    <option value="フルリモート" th:text="#{project.modal.remote.full}">フルリモート</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small" th:text="#{project.status}">ステータス</label>
                                <select id="proj-status" class="form-select form-select-dark bg-secondary text-white border-dark">
                                    <option value="募集中" th:text="#{project.status.open}">募集中</option>
                                    <option value="選考中" th:text="#{project.status.interviewing}">面談調整中 (選考中)</option>
                                    <option value="充足" th:text="#{project.status.filled_detail}">参画決定 (充足)</option>
                                    <option value="クローズ" th:text="#{project.status.closed}">クローズ</option>
                                </select>
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small" th:text="#{project.requiredCount}">必要人数</label>
                                <input type="number" id="proj-requiredCount" class="form-control form-control-dark bg-secondary text-white border-dark" min="1" value="1">
                            </div>
                        </div>

                        <hr class="border-secondary my-4">
                        <h6 class="text-light mb-3"><i class="bi bi-tools me-2 text-success"></i><th:block th:text="#{project.modal.skills}">要求スキル</th:block></h6>
                        <div id="project-skills-container">
                            <!-- JS will populate skill rows here -->
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-success mt-2" onclick="addProjectSkillRow()">
                            <i class="bi bi-plus"></i> <th:block th:text="#{project.modal.skill_add}">スキル追加</th:block>
                        </button>
                    </form>
                </div>
                <div class="modal-footer border-dark bg-dark">
                    <button type="button" class="btn btn-outline-secondary text-muted hover-text-white border-dark" data-bs-dismiss="modal" th:text="#{common.cancel}">キャンセル</button>
                    <button type="button" class="btn btn-success text-white border-0 shadow-sm px-4" onclick="saveProject()">
                        <i class="bi bi-check-lg me-1"></i><th:block th:text="#{common.register}">登録</th:block>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Matching Result Modal -->
    <div class="modal fade" id="matchingResultModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content bg-card border-dark shadow-lg">
                <div class="modal-header border-dark bg-dark">
                    <h5 class="modal-title text-white fw-bold"><i class="bi bi-robot me-2 text-accent-purple"></i><th:block th:text="#{project.matching.title}">候補要員 (AIマッチング)</th:block></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 bg-tertiary" id="matchingResultModalBody">
                    <div class="text-center text-muted py-5"><div class="spinner-border text-primary" role="status"></div><div class="mt-2" th:text="#{project.matching.loading}">AIマッチング実行中...</div></div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="page-js">
    <script th:src="@{/js/modules/project.js}"></script>
    <script>
        document.getElementById('projectModal').addEventListener('hidden.bs.modal', function () {
            document.getElementById('project-form').reset();
            document.getElementById('proj-id').value = '';
            document.getElementById('project-skills-container').innerHTML = '';
        });
    </script>
</th:block>
</body>
</html>
