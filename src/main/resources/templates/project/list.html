<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>案件管理 - SES Manager Pro</title>
</head>
<body>
<div layout:fragment="content" class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h3 mb-0 text-light"><i class="bi bi-briefcase me-2 text-success"></i>案件管理</h2>
        <button class="btn btn-success shadow-sm" data-bs-toggle="modal" data-bs-target="#projectModal">
            <i class="bi bi-plus-lg me-1"></i>新規登録
        </button>
    </div>

    <!-- 検索フィルター -->
    <div class="card bg-card border-dark shadow-sm mb-4">
        <div class="card-body">
            <form action="/project/list" method="get" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label for="searchProjectName" class="form-label text-muted small">案件名</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-muted border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control bg-dark border-secondary border-start-0 text-light focus-ring focus-ring-success" id="searchProjectName" name="projectName" placeholder="金融系システム移行など">
                    </div>
                </div>
                <div class="col-md-3">
                    <label for="searchCustomer" class="form-label text-muted small">顧客</label>
                    <input type="text" class="form-control bg-dark border-secondary text-light" id="searchCustomer" name="customer" placeholder="会社名">
                </div>
                <div class="col-md-3">
                    <label for="searchStatus" class="form-label text-muted small">ステータス</label>
                    <select class="form-select bg-dark border-secondary text-light" id="searchStatus" name="status">
                        <option value="">すべて</option>
                        <option value="1">募集中</option>
                        <option value="2">面談調整中</option>
                        <option value="3">参画決定</option>
                        <option value="4">終了</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-outline-success w-100">
                        <i class="bi bi-filter me-1"></i>絞り込み
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 一覧データテーブル -->
    <div class="card bg-card border-dark shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark table-hover table-striped mb-0 align-middle">
                    <thead class="table-dark-header border-bottom border-dark">
                        <tr>
                            <th scope="col" class="ps-4">案件名</th>
                            <th scope="col">顧客</th>
                            <th scope="col">単価(下限-上限)</th>
                            <th scope="col" class="text-center">募集人数</th>
                            <th scope="col" class="text-center">リモート</th>
                            <th scope="col">ステータス</th>
                            <th scope="col" class="text-end pe-4">アクション</th>
                        </tr>
                    </thead>
                    <tbody id="project-table-body">
                        <!-- JS will populate results here -->
                    </tbody>
                </table>
            </div>
            
            <!-- ページネーション -->
            <div class="card-footer border-dark bg-transparent py-3 d-flex justify-content-between align-items-center">
                <div class="text-muted small ps-2">
                    全 24 件中 1-4 件を表示
                </div>
                <nav aria-label="Page navigation">
                    <ul class="pagination pagination-sm mb-0 pe-2">
                        <li class="page-item disabled">
                            <a class="page-link bg-dark border-secondary text-muted" href="#" tabindex="-1" aria-disabled="true"><i class="bi bi-chevron-left"></i></a>
                        </li>
                        <li class="page-item active" aria-current="page">
                            <a class="page-link bg-success border-success text-white" href="#">1</a>
                        </li>
                        <li class="page-item"><a class="page-link bg-dark border-secondary text-light" href="#">2</a></li>
                        <li class="page-item"><a class="page-link bg-dark border-secondary text-light" href="#">3</a></li>
                        <li class="page-item"><a class="page-link bg-dark border-secondary text-light disabled border-0"><span class="bg-transparent border-0 text-muted">...</span></a></li>
                        <li class="page-item"><a class="page-link bg-dark border-secondary text-light" href="#">6</a></li>
                        <li class="page-item">
                            <a class="page-link bg-dark border-secondary text-light" href="#"><i class="bi bi-chevron-right"></i></a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- Project Registration Modal -->
    <div class="modal fade" id="projectModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-card border-dark shadow-lg">
                <div class="modal-header border-dark bg-dark">
                    <h5 class="modal-title text-white fw-bold"><i class="bi bi-briefcase me-2 text-success"></i>案件登録</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="project-form">
                        <div class="mb-3">
                            <label class="form-label text-muted small">案件名 <span class="text-danger">*</span></label>
                            <input type="text" id="proj-projectName" class="form-control form-control-dark bg-secondary text-white border-dark" placeholder="例: 〇〇システム開発" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">顧客</label>
                            <select id="proj-customerId" class="form-select form-select-dark bg-secondary text-white border-dark">
                                <option value="1">システム登録済みの顧客を選択...</option>
                                <!-- JS will populate customers -->
                            </select>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small">単価下限 (万円)</label>
                                <input type="number" id="proj-unitPriceMin" class="form-control form-control-dark bg-secondary text-white border-dark" placeholder="例: 600000">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small">単価上限 (万円)</label>
                                <input type="number" id="proj-unitPriceMax" class="form-control form-control-dark bg-secondary text-white border-dark" placeholder="例: 800000">
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small">リモート区分</label>
                                <select id="proj-remoteType" class="form-select form-select-dark bg-secondary text-white border-dark">
                                    <option value="フル出社">フル出社</option>
                                    <option value="ハイブリッド">一部リモート</option>
                                    <option value="フルリモート">フルリモート</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small">ステータス</label>
                                <select id="proj-status" class="form-select form-select-dark bg-secondary text-white border-dark">
                                    <option value="募集中">募集中</option>
                                    <option value="選考中">面談調整中 (選考中)</option>
                                    <option value="充足">参画決定 (充足)</option>
                                    <option value="クローズ">クローズ</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-dark bg-dark">
                    <button type="button" class="btn btn-outline-secondary text-muted hover-text-white border-dark" data-bs-dismiss="modal">キャンセル</button>
                    <button type="button" class="btn btn-success text-white border-0 shadow-sm px-4" onclick="saveProject()">
                        <i class="bi bi-check-lg me-1"></i>登録
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="page-js">
    <script th:src="@{/js/modules/project.js}"></script>
</th:block>
</body>
</html>
