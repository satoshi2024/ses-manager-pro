<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${(status != null ? status : 'エラー') + ' | SES Manager Pro'}">エラー | SES Manager Pro</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link th:href="@{/css/common.css}" rel="stylesheet">

    <!-- 保存済みテーマの適用（FOUC防止のためhead内で同期実行） -->
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('ses_theme') || 'light';
                document.documentElement.setAttribute('data-bs-theme', theme);
            } catch (e) {}
        })();
    </script>

    <style>
        body {
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-tertiary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--text-primary);
            text-align: center;
            padding: 1.5rem;
        }

        .error-card {
            background: var(--card-bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 480px;
            padding: 3rem 2.5rem;
            animation: fadeInUP 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInUP {
            to { opacity: 1; transform: translateY(0); }
        }

        .error-code {
            font-size: 4.5rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-icon {
            font-size: 3rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .btn-home {
            background: linear-gradient(45deg, #2563eb, #4f46e5);
            border: none;
            padding: 0.65rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: linear-gradient(45deg, #1d4ed8, #4338ca);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }
    </style>
</head>
<body>
    <div class="error-card">
        <i th:class="'bi ' + ${icon != null ? icon : 'bi-exclamation-triangle'} + ' error-icon'" class="bi bi-exclamation-triangle error-icon"></i>
        <div class="error-code" th:text="${status != null ? status : 'エラー'}">エラー</div>
        <h4 class="fw-bold text-white mt-3 mb-2" th:text="${title != null ? title : 'エラーが発生しました'}">エラーが発生しました</h4>
        <p class="text-muted small mb-4" th:text="${message != null ? message : '予期しないエラーが発生しました。'}">
            予期しないエラーが発生しました。
        </p>

        <div class="d-flex justify-content-center gap-2">
            <a th:href="@{/dashboard}" class="btn btn-primary btn-home rounded-sm text-white">
                <i class="bi bi-house-door me-2"></i>ダッシュボードへ
            </a>
            <a th:href="@{/login}" class="btn btn-outline-secondary rounded-sm">
                <i class="bi bi-box-arrow-in-right me-2"></i>ログイン画面へ
            </a>
        </div>

        <div class="text-center mt-4 text-muted small">
            &copy; 2026 SES Manager Pro
        </div>
    </div>
</body>
</html>
