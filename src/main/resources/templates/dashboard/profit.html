<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title th:text="#{dashboard.profit.title}">利益分析</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="text-white fw-bold mb-1">
            <i class="bi bi-graph-up-arrow me-2 text-accent-yellow"></i><span th:text="#{dashboard.profit.title}">利益分析</span>
        </h4>
    </div>

    <div class="card bg-card border-dark shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark table-hover table-striped mb-0 align-middle">
                    <thead class="table-secondary border-dark">
                        <tr>
                            <th class="px-4 py-3" th:text="#{dashboard.profit.col.contract_no}">契約番号</th>
                            <th class="py-3" th:text="#{dashboard.profit.col.engineer}">要員名</th>
                            <th class="py-3" th:text="#{dashboard.profit.col.project}">案件名</th>
                            <th class="py-3 text-end" th:text="#{dashboard.profit.col.selling_price}">売上単価</th>
                            <th class="py-3 text-end" th:text="#{dashboard.profit.col.cost_price}">原価</th>
                            <th class="py-3 text-end" th:text="#{dashboard.profit.col.profit}">粗利額</th>
                            <th class="px-4 py-3 text-end" th:text="#{dashboard.profit.col.profit_rate}">粗利率</th>
                        </tr>
                    </thead>
                    <tbody id="profit-table-body">
                        <!-- JSにより動的生成。0件時は「契約データがありません」を表示 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="page-js">
    <script th:src="@{/js/modules/dashboard-profit.js}"></script>
</th:block>
</body>
</html>
