<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title th:text="#{contract.renewalCalendar.btn} + ' - ' + #{app.name}">更新カレンダー - 契約更新</title>
</head>
<body>

<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h4 class="text-white fw-bold mb-1"><i class="bi bi-calendar-check me-2 text-accent-green"></i><th:block th:text="#{contract.renewalCalendar.title}">契約更新カレンダー</th:block></h4>
            <p class="text-muted small mb-0" th:text="#{contract.renewalCalendar.desc}">契約の更新期限を月/週で俯瞰し、対応状況を確認・更新します</p>
        </div>
        <div class="d-flex align-items-center flex-wrap gap-2">
            <div class="btn-group btn-group-sm me-2" role="group" id="renewal-nav-buttons">
                <button type="button" class="btn btn-outline-secondary text-muted hover-text-white border-dark" id="renewal-nav-prev" th:title="#{contract.renewalCalendar.nav.prev}" title="前へ"><i class="bi bi-chevron-left"></i></button>
                <button type="button" class="btn btn-outline-secondary text-muted hover-text-white border-dark" id="renewal-nav-today" th:text="#{contract.renewalCalendar.nav.today}">今日</button>
                <button type="button" class="btn btn-outline-secondary text-muted hover-text-white border-dark" id="renewal-nav-next" th:title="#{contract.renewalCalendar.nav.next}" title="次へ"><i class="bi bi-chevron-right"></i></button>
            </div>
            <span class="text-white fw-bold me-2" id="renewal-current-label">-</span>
            <div class="btn-group btn-group-sm me-3" role="group" id="renewal-view-mode-buttons">
                <button type="button" class="btn btn-outline-secondary text-muted hover-text-white border-dark active" data-mode="Month" th:text="#{gantt.view.month}">月</button>
                <button type="button" class="btn btn-outline-secondary text-muted hover-text-white border-dark" data-mode="Week" th:text="#{gantt.view.week}">週</button>
            </div>
            <a href="/contract/list" class="btn btn-outline-secondary btn-sm text-muted hover-text-white border-dark">
                <i class="bi bi-list me-1"></i><th:block th:text="#{gantt.list.btn}">リスト表示</th:block>
            </a>
        </div>
    </div>

    <!-- 上限超過(truncated)警告バナー -->
    <div id="renewal-truncated-banner" class="alert alert-warning d-none py-2 small mb-3">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>
        <th:block th:text="#{contract.renewalCalendar.truncated}">表示上限(1000件)を超えたため一部の契約が表示されていません。期間を絞り込んでください。</th:block>
    </div>

    <!-- 凡例 -->
    <div class="card bg-card border-dark shadow-sm mb-3">
        <div class="card-body py-2 px-3 d-flex flex-wrap gap-3 align-items-center">
            <span class="text-muted small me-1" th:text="#{contract.renewalCalendar.legend.label}">凡例:</span>
            <span class="small text-white"><span class="status-badge status-danger me-1">&nbsp;</span><th:block th:text="#{contract.renewalCalendar.legend.unhandled}">未対応</th:block></span>
            <span class="small text-white"><span class="status-badge status-warning me-1">&nbsp;</span><th:block th:text="#{contract.renewalCalendar.legend.draft}">ドラフト有</th:block></span>
            <span class="small text-white"><span class="status-badge status-success me-1">&nbsp;</span><th:block th:text="#{contract.renewalCalendar.legend.confirmed}">確定</th:block></span>
            <span class="small text-white"><span class="status-badge status-primary me-1">&nbsp;</span><th:block th:text="#{contract.renewalCalendar.legend.continue}">継続確定</th:block></span>
            <span class="small text-white"><span class="status-badge status-secondary me-1">&nbsp;</span><th:block th:text="#{contract.renewalCalendar.legend.endScheduled}">終了予定</th:block></span>
        </div>
    </div>

    <div class="card bg-card border-dark shadow-sm">
        <div class="card-body p-3" style="overflow-x: auto;">
            <div id="renewal-calendar-target"></div>
            <!-- Loading indicator -->
            <div id="renewal-calendar-loading" class="text-center text-muted p-5">
                <div class="spinner-border spinner-border-sm me-2"></div><th:block th:text="#{common.loading}">読み込み中...</th:block>
            </div>
        </div>
    </div>

    <!-- クリックスルー詳細モーダル -->
    <div class="modal fade" id="renewalDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-card border-dark shadow-lg">
                <div class="modal-header border-dark bg-dark">
                    <h5 class="modal-title text-white fw-bold">
                        <i class="bi bi-file-earmark-text me-2 text-accent-green"></i><span id="renewalDetailContractNo">-</span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-2 small"><span class="text-muted" th:text="#{contract.engineer}">稼働要員</span>: <span id="renewalDetailEngineer" class="text-white fw-bold">-</span></div>
                    <div class="mb-2 small"><span class="text-muted" th:text="#{contract.customer}">顧客</span>: <span id="renewalDetailCustomer" class="text-white">-</span></div>
                    <div class="mb-2 small"><span class="text-muted" th:text="#{contract.salesUser}">担当営業</span>: <span id="renewalDetailSalesUser" class="text-white">-</span></div>
                    <div class="mb-2 small"><span class="text-muted" th:text="#{contract.endDate}">終了予定日</span>: <span id="renewalDetailEndDate" class="text-white">-</span></div>
                    <div class="mb-2 small"><span class="text-muted" th:text="#{contract.renewalCalendar.detail.dueDate}">更新期限</span>: <span id="renewalDetailDueDate" class="text-white">-</span></div>
                    <div class="mb-2 small"><span class="text-muted" th:text="#{common.status}">ステータス</span>: <span id="renewalDetailStatus" class="text-white">-</span></div>
                    <div class="mb-1 small"><span class="text-muted" th:text="#{contract.renewalCalendar.detail.state}">更新状態</span>: <span id="renewalDetailState">-</span></div>
                </div>
                <div class="modal-footer border-dark bg-dark flex-wrap gap-2 justify-content-start">
                    <button type="button" class="btn btn-outline-primary btn-sm" id="renewalDetailBtnContinue">
                        <i class="bi bi-check-circle me-1"></i><th:block th:text="#{contract.renewalCalendar.action.continue}">継続確定</th:block>
                    </button>
                    <button type="button" class="btn btn-outline-secondary btn-sm text-muted hover-text-white border-dark" id="renewalDetailBtnEnd">
                        <i class="bi bi-x-circle me-1"></i><th:block th:text="#{contract.renewalCalendar.action.end}">更新不要</th:block>
                    </button>
                    <button type="button" class="btn btn-outline-warning btn-sm" id="renewalDetailBtnReset">
                        <i class="bi bi-arrow-counterclockwise me-1"></i><th:block th:text="#{contract.renewalCalendar.action.reset}">未定に戻す</th:block>
                    </button>
                    <a href="/contract/list" class="btn btn-outline-secondary btn-sm text-muted hover-text-white border-dark ms-auto">
                        <i class="bi bi-list me-1"></i><th:block th:text="#{gantt.list.btn}">リスト表示</th:block>
                    </a>
                </div>
            </div>
        </div>
    </div>

</div>

<th:block layout:fragment="page-css">
    <style>
        .renewal-calendar-headrow {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 1px;
            background: var(--border-color);
            border: 1px solid var(--border-color);
            border-bottom: none;
        }
        .renewal-calendar-headrow > div {
            background: var(--bg-secondary);
            padding: 6px 8px;
            text-align: center;
        }
        .renewal-calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 1px;
            background: var(--border-color);
            border: 1px solid var(--border-color);
            min-width: 700px;
        }
        .renewal-calendar-grid.week-mode {
            min-width: 700px;
        }
        .renewal-day-cell {
            background: var(--bg-card);
            min-height: 110px;
            max-height: 220px;
            overflow-y: auto;
            padding: 4px 6px;
        }
        .renewal-day-cell.other-month {
            opacity: 0.4;
        }
        .renewal-day-cell.is-today {
            box-shadow: inset 0 0 0 2px var(--accent-blue);
        }
        .renewal-day-num {
            font-size: .72rem;
            margin-bottom: 2px;
        }
        .renewal-pill {
            display: block;
            width: 100%;
            text-align: left;
            font-size: .68rem;
            line-height: 1.3;
            padding: 2px 6px;
            border-radius: 10px;
            margin-bottom: 3px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid transparent;
        }
        .renewal-day-empty {
            font-size: .65rem;
        }
    </style>
</th:block>

<th:block layout:fragment="page-js">
    <script th:src="@{/js/modules/contract-renewal-calendar.js}"></script>
</th:block>

</body>
</html>
