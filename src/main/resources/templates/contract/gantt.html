<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title th:text="#{contract.gantt.btn} + ' - ' + #{app.name}">ガントチャート - 稼動状況</title>
    <!-- Frappe Gantt CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.css">
    <link rel="stylesheet" th:href="@{/css/gantt.css}">
</head>
<body>

<div layout:fragment="content">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="text-white fw-bold mb-1"><i class="bi bi-bar-chart-steps me-2 text-accent-green"></i><th:block th:text="#{contract.gantt.btn}">稼動ガントチャート</th:block></h4>
            <p class="text-muted small mb-0" th:text="#{gantt.desc}">エンジニアの現在および今後のアサイン状況を可視化</p>
        </div>
        <div class="d-flex align-items-center flex-wrap gap-2">
            <div class="d-flex align-items-center me-2">
                <input type="date" class="form-control form-control-sm bg-input border-dark text-white" id="filter-period-from">
                <span class="mx-2 text-muted">~</span>
                <input type="date" class="form-control form-control-sm bg-input border-dark text-white" id="filter-period-to">
                <button type="button" class="btn btn-sm btn-primary ms-2" id="btn-reload-gantt" th:text="#{common.btn.search}">検索</button>
            </div>
            <div class="btn-group btn-group-sm me-3" role="group" id="view-mode-buttons">
                <button type="button" class="btn btn-outline-secondary text-muted hover-text-white border-dark active" data-mode="Day" th:text="#{gantt.view.day}">日</button>
                <button type="button" class="btn btn-outline-secondary text-muted hover-text-white border-dark" data-mode="Week" th:text="#{gantt.view.week}">週</button>
                <button type="button" class="btn btn-outline-secondary text-muted hover-text-white border-dark" data-mode="Month" th:text="#{gantt.view.month}">月</button>
            </div>
            <a href="/contract/list" class="btn btn-outline-secondary btn-sm text-muted hover-text-white border-dark">
                <i class="bi bi-list me-1"></i><th:block th:text="#{gantt.list.btn}">リスト表示</th:block>
            </a>
        </div>
    </div>

    <div class="card bg-card border-dark shadow-sm">
        <div class="card-body p-4" style="overflow-x: auto;">
            <div id="gantt-target"></div>
            <!-- Loading indicator -->
            <div id="gantt-loading" class="text-center text-muted p-5">
                <div class="spinner-border spinner-border-sm me-2"></div><th:block th:text="#{common.loading}">読み込み中...</th:block>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="page-js">
    <!-- Frappe Gantt JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.min.js"></script>
    <script th:src="@{/js/modules/contract-gantt.js}"></script>
</th:block>

</body>
</html>
