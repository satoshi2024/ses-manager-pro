<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title th:text="#{contract.list} + ' - ' + #{app.name}">契約一覧</title>
</head>
<body>

<div layout:fragment="content">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="text-white fw-bold mb-1"><i class="bi bi-file-earmark-text me-2 text-accent-green"></i><th:block th:text="#{contract.list}">契約一覧</th:block></h4>
            <p class="text-muted small mb-0" th:text="#{contract.list.desc}">すべての稼動・終了契約の管理と確認</p>
        </div>
        <div>
            <a href="/contract/gantt" class="btn btn-outline-secondary text-muted hover-text-white border-dark me-2">
                <i class="bi bi-bar-chart-steps me-1"></i><th:block th:text="#{contract.gantt.btn}">ガントチャート</th:block>
            </a>
            <button class="btn btn-outline-secondary text-muted hover-text-white border-dark me-2" onclick="exportContracts()">
                <i class="bi bi-file-earmark-excel me-1"></i><th:block th:text="#{contract.excel.btn}">Excel出力</th:block>
            </button>
            <button class="btn btn-primary bg-gradient-blue border-0 shadow-sm rounded-pill px-3" onclick="openNewContract()">
                <i class="bi bi-plus-lg me-1"></i><th:block th:text="#{contract.new}">新規契約</th:block>
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div class="card bg-card border-dark shadow-sm mb-4">
        <div class="card-body p-3">
            <form class="row g-3 align-items-end" id="search-form">
                <div class="col-md-2">
                    <label class="form-label text-muted small mb-1" th:text="#{common.status}">ステータス</label>
                    <select class="form-select form-select-sm form-select-dark bg-secondary text-white border-dark" name="status">
                        <option value="" th:text="#{contract.status.all}">すべて</option>
                        <option value="準備中" th:text="#{contract.status.preparing}">準備中</option>
                        <option value="稼動中" th:text="#{contract.status.active}">稼動中</option>
                        <option value="終了" th:text="#{contract.status.ended}">終了</option>
                        <option value="解約" th:text="#{contract.status.cancelled}">解約</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label text-muted small mb-1" th:text="#{contract.customer}">顧客</label>
                    <select class="form-select form-select-sm form-select-dark bg-secondary text-white border-dark" name="customerId" id="search-customerId">
                        <option value="" th:text="#{contract.customer.filter}">顧客で絞り込み</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label text-muted small mb-1" th:text="#{contract.salesUser}">担当営業</label>
                    <select class="form-select form-select-sm form-select-dark bg-secondary text-white border-dark" name="salesUserId" id="search-salesUserId">
                        <option value="" th:text="#{contract.salesRep.filter}">営業で絞り込み</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label text-muted small mb-1" th:text="#{contract.contractNo}">契約No</label>
                    <input type="text" class="form-control form-control-sm form-control-dark bg-secondary text-white border-dark" name="contractNo" th:placeholder="#{contract.no.search}" placeholder="契約Noで検索">
                </div>
                <div class="col-md-3">
                    <label class="form-label text-muted small mb-1" th:text="#{contract.endDate}">終了日</label>
                    <div class="d-flex align-items-center mobile-date-range">
                        <input type="date" class="form-control form-control-sm form-control-dark bg-secondary text-white border-dark" name="endDateFrom">
                        <span class="mx-1 text-muted" th:text="#{contract.date.from_to}">〜</span>
                        <input type="date" class="form-control form-control-sm form-control-dark bg-secondary text-white border-dark" name="endDateTo">
                    </div>
                </div>
                <div class="col-md-1">
                    <button type="button" class="btn btn-sm btn-outline-primary w-100 border-dark text-accent-blue hover-bg-blue" onclick="loadContracts()">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="card bg-card border-dark shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark table-hover table-striped mb-0 align-middle">
                    <thead class="table-secondary border-dark">
                        <tr>
                            <th class="px-4 py-3 text-muted small text-uppercase" th:text="#{contract.table.no}">契約番号</th>
                            <th class="py-3 text-muted small text-uppercase" th:text="#{contract.table.engineer}">稼動要員</th>
                            <th class="py-3 text-muted small text-uppercase" th:text="#{contract.table.customer_project}">顧客・案件</th>
                            <th class="py-3 text-muted small text-uppercase" th:text="#{contract.salesUser}">担当営業</th>
                            <th class="py-3 text-muted small text-uppercase" th:text="#{contract.table.period}">期間</th>
                            <th class="py-3 text-muted small text-uppercase" th:text="#{contract.table.price}">単価(売/原)</th>
                            <th class="py-3 text-muted small text-uppercase" th:text="#{common.status}">ステータス</th>
                            <th class="px-4 py-3 text-end text-muted small text-uppercase" th:text="#{common.actions}">操作</th>
                        </tr>
                    </thead>
                    <tbody class="border-top-0" id="contract-table-body">
                        <!-- JS renders this -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <!-- Contract Registration Modal -->
    <div class="modal fade" id="contractModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-card border-dark shadow-lg">
                <div class="modal-header border-dark bg-dark">
                    <h5 class="modal-title text-white fw-bold"><i class="bi bi-file-earmark-plus me-2 text-accent-green"></i><span id="contractModalTitle" th:text="#{contract.new}">契約登録</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="contract-form">
                        <input type="hidden" id="cont-id">
                        <div class="mb-3">
                            <label class="form-label text-muted small"><th:block th:text="#{contract.engineer}">稼働要員</th:block> <span class="text-danger">*</span></label>
                            <select id="cont-engineerId" class="form-select form-select-dark bg-secondary text-white border-dark" required>
                                <option value="" th:text="#{contract.engineer.select}">システム登録済みの要員を選択...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small"><th:block th:text="#{contract.project}">案件</th:block> <span class="text-danger">*</span></label>
                            <select id="cont-projectId" class="form-select form-select-dark bg-secondary text-white border-dark" required>
                                <option value="" th:text="#{contract.project.select}">システム登録済みの案件を選択...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small" th:text="#{contract.customer}">顧客</label>
                            <select id="cont-customerId" class="form-select form-select-dark bg-secondary text-white border-dark">
                                <option value="" th:text="#{contract.customer.select}">顧客を選択...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small" th:text="#{contract.salesUser}">担当営業</label>
                            <select id="cont-salesUserId" class="form-select form-select-dark bg-secondary text-white border-dark">
                                <option value="" th:text="#{contract.salesRep.select}">営業を選択...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small" th:text="#{contract.contractType}">契約形態</label>
                            <select id="cont-contractType" class="form-select form-select-dark bg-secondary text-white border-dark">
                                <option value="準委任" th:text="#{contract.contractType.quasiMandate}">準委任</option>
                                <option value="請負" th:text="#{contract.contractType.contract}">請負</option>
                                <option value="派遣" th:text="#{contract.contractType.dispatch}">派遣</option>
                            </select>
                        </div>
                        <div class="form-check mb-3">
                            <input type="checkbox" id="cont-directCommandFlag" class="form-check-input">
                            <label class="form-check-label text-muted small" for="cont-directCommandFlag" th:text="#{contract.directCommandFlag}">指揮命令の実態がある（発注者から直接の指揮命令を受けている）</label>
                        </div>
                        <div id="complianceWarning" class="alert alert-warning d-none"></div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small" th:text="#{contract.startDate}">開始日</label>
                                <input type="date" id="cont-startDate" class="form-control form-control-dark bg-secondary text-white border-dark" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small" th:text="#{contract.endDate}">終了予定日</label>
                                <input type="date" id="cont-endDate" class="form-control form-control-dark bg-secondary text-white border-dark">
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small" th:text="#{contract.sellingPrice}">売上単価 (円)</label>
                                <input type="number" id="cont-sellingPrice" class="form-control form-control-dark bg-secondary text-white border-dark" th:placeholder="#{contract.placeholder.sellingPrice}" placeholder="例: 800000" min="0" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small"><th:block th:text="#{contract.costPrice}">原価 (円)</th:block> <span class="text-danger">*</span></label>
                                <input type="number" id="cont-costPrice" class="form-control form-control-dark bg-secondary text-white border-dark" th:placeholder="#{contract.placeholder.costPrice}" placeholder="例: 600000" min="0" required>
                            </div>
                            <div class="col-12" id="priceRevisionArea" style="display:none">
                                <button type="button" class="btn btn-sm btn-outline-warning" onclick="openPriceRevisionModal()"
                                        th:text="#{contract.priceRevision.button}">単価改定</button>
                                <span class="badge bg-warning text-dark ms-2" id="reservedBadge" style="display:none" th:text="#{contract.priceRevision.reserved}">改定予約あり</span>
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small" th:text="#{contract.settlementMin}">精算下限(h)</label>
                                <input type="number" id="cont-settlementHoursMin" class="form-control form-control-dark bg-secondary text-white border-dark" step="0.1" min="0" placeholder="140">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small" th:text="#{contract.settlementMax}">精算上限(h)</label>
                                <input type="number" id="cont-settlementHoursMax" class="form-control form-control-dark bg-secondary text-white border-dark" step="0.1" min="0" placeholder="180">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small" th:text="#{contract.fractionRule}">端数処理ルール</label>
                            <input type="text" id="cont-fractionRule" class="form-control form-control-dark bg-secondary text-white border-dark">
                            <div class="form-text text-muted small mt-1"><i class="bi bi-info-circle me-1"></i><th:block th:text="#{contract.fractionRule.note}">精算計算は常に1円未満切り捨てです。この欄はメモであり計算には適用されません。</th:block></div>
                        </div>
                        <div class="mb-3" id="cont-quotationLinkWrapper" style="display:none">
                            <label class="form-label text-muted small">参照見積</label>
                            <div><a href="#" id="cont-quotationDetailLink" class="text-info text-decoration-none me-3"><i class="bi bi-file-text"></i> 元見積を開く</a>
                                 <a href="#" id="cont-quotationLink" target="_blank" class="text-info text-decoration-none"><i class="bi bi-file-pdf"></i> 見積書PDFを表示</a></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small" th:text="#{contract.autoRenew}">自動更新</label>
                            <select id="cont-autoRenew" class="form-select form-select-dark bg-secondary text-white border-dark">
                                <option value="0" th:text="#{contract.autoRenew.no}">しない</option>
                                <option value="1" th:text="#{contract.autoRenew.yes}">する</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <a class="text-accent-blue text-decoration-none small" data-bs-toggle="collapse" href="#commissionConfig" role="button" aria-expanded="false" aria-controls="commissionConfig">
                                <i class="bi bi-gear me-1"></i><th:block th:text="#{contract.commissionSection}">インセンティブ個別設定</th:block>
                            </a>
                            <div class="collapse mt-2" id="commissionConfig">
                                <div class="card card-body bg-dark border-secondary p-3">
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label class="form-label text-muted small" th:text="#{contract.commissionBaseType}">基準</label>
                                            <select id="cont-commissionBaseType" class="form-select form-select-sm form-select-dark bg-secondary text-white border-dark">
                                                <option value="" th:text="#{contract.commissionDefault}">既定規則に従う</option>
                                                <option value="粗利" th:text="#{contract.commissionBase.profit}">粗利</option>
                                                <option value="売上" th:text="#{contract.commissionBase.sales}">売上</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label text-muted small" th:text="#{contract.commissionRate}">率 (%)</label>
                                            <input type="number" id="cont-commissionRate" class="form-control form-control-sm form-control-dark bg-secondary text-white border-dark" step="0.1" min="0" max="100" th:placeholder="#{contract.commission.rate.placeholder}" placeholder="例: 5.0">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-dark bg-dark">
                    <button type="button" class="btn btn-outline-secondary text-muted hover-text-white border-dark" data-bs-dismiss="modal" th:text="#{common.cancel}">キャンセル</button>
                    <button type="button" class="btn btn-primary bg-gradient-blue border-0 shadow-sm px-4" onclick="saveContract()">
                        <i class="bi bi-check-lg me-1"></i><span id="contractSaveBtnLabel" th:text="#{common.register}">登録</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 単価改定モーダル -->
    <div class="modal fade" id="priceRevisionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-card border-dark shadow-lg">
                <div class="modal-header border-dark bg-dark">
                    <h5 class="modal-title text-white fw-bold" th:text="#{contract.priceRevision.title}">単価改定</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="priceRevWarning" class="alert alert-warning d-none" th:text="#{contract.priceRevision.pastWarning}"></div>
                    <table class="table table-sm table-dark table-bordered" id="priceRevTable">
                        <thead><tr>
                            <th th:text="#{contract.priceRevision.applyFrom}">適用開始月</th>
                            <th th:text="#{contract.priceRevision.selling}">売上単価</th>
                            <th th:text="#{contract.priceRevision.cost}">原価</th>
                            <th th:text="#{contract.priceRevision.reason}">改定理由</th>
                            <th></th>
                        </tr></thead>
                        <tbody></tbody>
                    </table>
                    <hr class="border-dark">
                    <form id="priceRevForm" class="row g-2">
                        <div class="col-md-3">
                            <label class="form-label small text-muted" th:text="#{contract.priceRevision.applyFrom}">適用開始月</label>
                            <input type="month" name="applyFromMonth" class="form-control form-control-dark bg-secondary text-white border-dark" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small text-muted" th:text="#{contract.priceRevision.selling}">売上単価</label>
                            <input type="number" name="sellingPrice" class="form-control form-control-dark bg-secondary text-white border-dark" min="0" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small text-muted" th:text="#{contract.priceRevision.cost}">原価</label>
                            <input type="number" name="costPrice" class="form-control form-control-dark bg-secondary text-white border-dark" min="0" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small text-muted" th:text="#{contract.priceRevision.reason}">改定理由</label>
                            <input type="text" name="reason" class="form-control form-control-dark bg-secondary text-white border-dark">
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-dark">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.btn.cancel}">閉じる</button>
                    <button type="button" class="btn btn-primary" onclick="submitPriceRevision()" th:text="#{contract.priceRevision.add}">改定を登録</button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="page-js">
    <script th:src="@{/js/modules/contract.js}"></script>
    <script th:src="@{/js/modules/contract-price-revision.js}"></script>
</th:block>

</body>
</html>
