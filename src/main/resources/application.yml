# ========================================
# SES Manager Pro - メイン設定
# ========================================
server:
  port: 8080
  forward-headers-strategy: framework
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    session:
      timeout: 30m
  # ===== エラー表示（顧客に生の情報を見せない） =====
  error:
    whitelabel:
      enabled: false
    include-message: never
    include-stacktrace: never
    include-exception: false

spring:
  profiles:
    active: dev

  # ===== マルチパート（ファイルアップロード）上限 =====
  # 個別ファイルはFileKindでさらに厳格に検証する（スキルシート10MB/写真2MB）
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  # ===== データソース（接続情報は環境変数で上書き可能。既定値はローカル開発用） =====
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ses_manager_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Tokyo}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # H2 Console (Disabled since we use MySQL now)
  h2:
    console:
      enabled: false

  # ===== Flyway（DBマイグレーション。旧「001〜009を手動実行」手順を自動化） =====
  # 既存の手動構築済みDBに対して初めて導入する場合は baseline-on-migrate により
  # 「既にV9まで適用済み」とみなして以降のマイグレーションのみ実行する。
  # prod では application-prod.yml が db/migration-prod を追加ロケーションとして
  # 差し込み、admin初期パスワードのBCrypt化(V10)のみ prod 限定で適用する。
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 9
    baseline-description: "手動SQL(001-009)適用済みベースライン"

  # ===== Thymeleaf =====
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

  # ===== メッセージリソース =====
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false   # 必須: サーバーOSロケールへ落ちるのを防ぐ
    use-code-as-default-message: true  # キー欠落でも画面が死なない(欠落はテストで検出)

  # ===== Jackson (JSON) =====
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Tokyo
    serialization:
      write-dates-as-timestamps: false

  # ===== メール送信（SMTP。host未設定時はドライラン動作） =====
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ===== MyBatis Plus =====
# 本プロジェクトはXMLマッパーを持たない（クエリはLambdaQueryWrapper/@Selectで完結）ため
# mapper-locations は設定しない。
mybatis-plus:
  type-aliases-package: com.ses.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    banner: false
    db-config:
      id-type: auto
      logic-delete-field: deletedFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
      insert-strategy: not_null
      update-strategy: not_null

# ===== ログ =====
logging:
  level:
    root: INFO
    com.ses: DEBUG
    com.baomidou.mybatisplus: DEBUG

# ===== アプリ固有設定 =====
app:
  security:
    require-https: false
  # ファイルアップロード保存先（相対パスはアプリ起動ディレクトリ基準）
  upload:
    base-path: ${UPLOAD_BASE_PATH:./uploads}
  # メール差出人
  mail:
    from: ${MAIL_FROM:noreply@example.com}

# ===== AI設定（将来のAPI接続用） =====
ai:
  enabled: false
  provider: rule
  # 以下は将来のAPI接続時に有効化
  # api-key: ${AI_API_KEY:}
  # api-url: https://your-resource.openai.azure.com/
  # model: gpt-4o
  # max-tokens: 4096
