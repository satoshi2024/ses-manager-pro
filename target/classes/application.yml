# ========================================
# SES Manager Pro - メイン設定
# ========================================
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    session:
      timeout: 30m

spring:
  profiles:
    active: dev

  # ===== データソース =====
  datasource:
    url: jdbc:h2:mem:ses_manager_db;DB_CLOSE_DELAY=-1;MODE=MySQL;INIT=RUNSCRIPT FROM 'classpath:sql/001_create_tables.sql'\;RUNSCRIPT FROM 'classpath:sql/002_init_master_data.sql'
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

  # ===== Thymeleaf =====
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

  # ===== メッセージリソース =====
  messages:
    basename: messages_ja
    encoding: UTF-8

  # ===== Jackson (JSON) =====
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Tokyo
    serialization:
      write-dates-as-timestamps: false

# ===== MyBatis Plus =====
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.ses.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    banner: false
    db-config:
      id-type: auto
      logic-delete-field: deletedFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
      insert-strategy: not_null
      update-strategy: not_null

# ===== ログ =====
logging:
  level:
    root: INFO
    com.ses: DEBUG
    com.baomidou.mybatisplus: DEBUG

# ===== AI設定（将来のAPI接続用） =====
ai:
  enabled: false
  provider: mock
  # 以下は将来のAPI接続時に有効化
  # api-key: ${AI_API_KEY:}
  # api-url: https://your-resource.openai.azure.com/
  # model: gpt-4o
  # max-tokens: 4096
