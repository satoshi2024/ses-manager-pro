<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>要員管理 - SES Manager Pro</title>
</head>
<body>
<div layout:fragment="content" class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h3 mb-0 text-light"><i class="bi bi-person-badge me-2 text-primary"></i>要員管理</h2>
        <a href="/engineer/form" class="btn btn-primary shadow-sm">
            <i class="bi bi-plus-lg me-1"></i>新規登録
        </a>
    </div>

    <!-- 検索フィルター -->
    <div class="card bg-card border-dark shadow-sm mb-4">
        <div class="card-body">
            <form action="/engineer/list" method="get" class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label for="searchName" class="form-label text-muted small">名前</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-muted border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control bg-dark border-secondary border-start-0 text-light focus-ring focus-ring-primary" id="searchName" name="name" placeholder="山田 太郎">
                    </div>
                </div>
                <div class="col-md-2">
                    <label for="searchStatus" class="form-label text-muted small">ステータス</label>
                    <select class="form-select bg-dark border-secondary text-light" id="searchStatus" name="status">
                        <option value="">すべて</option>
                        <option value="1">稼働中</option>
                        <option value="2">待機中</option>
                        <option value="3">提案中</option>
                        <option value="4">離任予定</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="searchEmpType" class="form-label text-muted small">雇用形態</label>
                    <select class="form-select bg-dark border-secondary text-light" id="searchEmpType" name="empType">
                        <option value="">すべて</option>
                        <option value="1">正社員</option>
                        <option value="2">契約社員</option>
                        <option value="3">フリーランス</option>
                        <option value="4">パートナー</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="searchSkill" class="form-label text-muted small">スキル</label>
                    <input type="text" class="form-control bg-dark border-secondary text-light" id="searchSkill" name="skill" placeholder="Java, AWS, Vue.js など">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-outline-primary w-100">
                        <i class="bi bi-filter me-1"></i>絞り込み
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 一覧データテーブル -->
    <div class="card bg-card border-dark shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark table-hover table-striped mb-0 align-middle">
                    <thead class="table-dark-header border-bottom border-dark">
                        <tr>
                            <th scope="col" class="ps-4">氏名</th>
                            <th scope="col">稼動状態</th>
                            <th scope="col">雇用形態</th>
                            <th scope="col">経験年数</th>
                            <th scope="col">単価</th>
                            <th scope="col" class="text-end pe-4">アクション</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- モックデータ -->
                        <tr>
                            <td class="ps-4">
                                <div class="d-flex align-items-center py-1">
                                    <div class="avatar bg-primary text-white rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 36px; height: 36px;">山</div>
                                    <div>
                                        <div class="fw-bold">山田 太郎</div>
                                        <div class="text-muted small">ヤマダ タロウ</div>
                                    </div>
                                </div>
                            </td>
                            <td><span class="badge bg-success bg-opacity-20 text-success border border-success border-opacity-50 px-2 py-1">稼働中</span></td>
                            <td>正社員</td>
                            <td>5年</td>
                            <td>80万</td>
                            <td class="text-end pe-4">
                                <div class="btn-group btn-group-sm" role="group">
                                    <a href="#" class="btn btn-outline-secondary text-light border-secondary"><i class="bi bi-eye"></i></a>
                                    <a href="#" class="btn btn-outline-info text-info border-info"><i class="bi bi-pencil"></i></a>
                                    <button type="button" class="btn btn-outline-danger text-danger border-danger"><i class="bi bi-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="ps-4">
                                <div class="d-flex align-items-center py-1">
                                    <div class="avatar bg-info text-white rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 36px; height: 36px;">鈴</div>
                                    <div>
                                        <div class="fw-bold">鈴木 一郎</div>
                                        <div class="text-muted small">スズキ イチロウ</div>
                                    </div>
                                </div>
                            </td>
                            <td><span class="badge bg-warning bg-opacity-20 text-warning border border-warning border-opacity-50 px-2 py-1">提案中</span></td>
                            <td>フリーランス</td>
                            <td>12年</td>
                            <td>120万</td>
                            <td class="text-end pe-4">
                                <div class="btn-group btn-group-sm" role="group">
                                    <a href="#" class="btn btn-outline-secondary text-light border-secondary"><i class="bi bi-eye"></i></a>
                                    <a href="#" class="btn btn-outline-info text-info border-info"><i class="bi bi-pencil"></i></a>
                                    <button type="button" class="btn btn-outline-danger text-danger border-danger"><i class="bi bi-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="ps-4">
                                <div class="d-flex align-items-center py-1">
                                    <div class="avatar bg-secondary text-white rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 36px; height: 36px;">佐</div>
                                    <div>
                                        <div class="fw-bold">佐藤 花子</div>
                                        <div class="text-muted small">サトウ ハナコ</div>
                                    </div>
                                </div>
                            </td>
                            <td><span class="badge bg-secondary bg-opacity-20 text-secondary border border-secondary border-opacity-50 px-2 py-1">待機中</span></td>
                            <td>契約社員</td>
                            <td>3年</td>
                            <td>60万</td>
                            <td class="text-end pe-4">
                                <div class="btn-group btn-group-sm" role="group">
                                    <a href="#" class="btn btn-outline-secondary text-light border-secondary"><i class="bi bi-eye"></i></a>
                                    <a href="#" class="btn btn-outline-info text-info border-info"><i class="bi bi-pencil"></i></a>
                                    <button type="button" class="btn btn-outline-danger text-danger border-danger"><i class="bi bi-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="ps-4">
                                <div class="d-flex align-items-center py-1">
                                    <div class="avatar bg-success text-white rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 36px; height: 36px;">高</div>
                                    <div>
                                        <div class="fw-bold">高橋 健太</div>
                                        <div class="text-muted small">タカハシ ケンタ</div>
                                    </div>
                                </div>
                            </td>
                            <td><span class="badge bg-danger bg-opacity-20 text-danger border border-danger border-opacity-50 px-2 py-1">離任予定</span></td>
                            <td>パートナー</td>
                            <td>8年</td>
                            <td>95万</td>
                            <td class="text-end pe-4">
                                <div class="btn-group btn-group-sm" role="group">
                                    <a href="#" class="btn btn-outline-secondary text-light border-secondary"><i class="bi bi-eye"></i></a>
                                    <a href="#" class="btn btn-outline-info text-info border-info"><i class="bi bi-pencil"></i></a>
                                    <button type="button" class="btn btn-outline-danger text-danger border-danger"><i class="bi bi-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- ページネーション -->
            <div class="card-footer border-dark bg-transparent py-3 d-flex justify-content-between align-items-center">
                <div class="text-muted small ps-2">
                    全 42 件中 1-4 件を表示
                </div>
                <nav aria-label="Page navigation">
                    <ul class="pagination pagination-sm mb-0 pe-2">
                        <li class="page-item disabled">
                            <a class="page-link bg-dark border-secondary text-muted" href="#" tabindex="-1" aria-disabled="true"><i class="bi bi-chevron-left"></i></a>
                        </li>
                        <li class="page-item active" aria-current="page">
                            <a class="page-link bg-primary border-primary" href="#">1</a>
                        </li>
                        <li class="page-item"><a class="page-link bg-dark border-secondary text-light" href="#">2</a></li>
                        <li class="page-item"><a class="page-link bg-dark border-secondary text-light" href="#">3</a></li>
                        <li class="page-item"><a class="page-link bg-dark border-secondary text-light disabled border-0"><span class="bg-transparent border-0 text-muted">...</span></a></li>
                        <li class="page-item"><a class="page-link bg-dark border-secondary text-light" href="#">11</a></li>
                        <li class="page-item">
                            <a class="page-link bg-dark border-secondary text-light" href="#"><i class="bi bi-chevron-right"></i></a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
</body>
</html>
