<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <aside th:fragment="sidebar" id="sidebar" class="sidebar bg-secondary d-flex flex-column transition-base">
        
        <!-- Logo Area -->
        <div class="sidebar-brand d-flex align-items-center px-4 py-3">
            <i class="bi bi-briefcase-fill text-accent-blue fs-4 me-2"></i>
            <span class="brand-text fw-bold fs-5 text-white" th:text="#{app.name}">SES Manager Pro</span>
            <button class="btn btn-link text-white d-md-none ms-auto p-0" id="sidebar-close-btn">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        
        <!-- Navigation Menu -->
        <div class="sidebar-menu flex-grow-1 overflow-auto mt-3 px-2">
            <ul class="nav flex-column gap-1">
                <li class="nav-item">
                    <a th:href="@{/dashboard}" class="nav-link px-3 py-2 rounded-md" th:classappend="${currentUri == '/dashboard' ? 'active bg-tertiary text-white' : 'text-secondary'}">
                        <i class="bi bi-speedometer2 me-2"></i>
                        <span th:text="#{menu.dashboard}">ダッシュボード</span>
                    </a>
                </li>
                
                <li class="nav-item mt-3 mb-1 px-3">
                    <span class="text-muted small fw-bold text-uppercase">業務管理</span>
                </li>
                
                <li class="nav-item">
                    <a th:href="@{/engineer/list}" class="nav-link px-3 py-2 rounded-md" th:classappend="${#strings.startsWith(currentUri, '/engineer') ? 'active bg-tertiary text-white' : 'text-secondary'}">
                        <i class="bi bi-people me-2"></i>
                        <span th:text="#{menu.engineer}">要員管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/customer/list}" class="nav-link px-3 py-2 rounded-md" th:classappend="${#strings.startsWith(currentUri, '/customer') ? 'active bg-tertiary text-white' : 'text-secondary'}">
                        <i class="bi bi-building me-2"></i>
                        <span th:text="#{menu.customer}">顧客管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/project/list}" class="nav-link px-3 py-2 rounded-md" th:classappend="${#strings.startsWith(currentUri, '/project') ? 'active bg-tertiary text-white' : 'text-secondary'}">
                        <i class="bi bi-folder me-2"></i>
                        <span th:text="#{menu.project}">案件管理</span>
                    </a>
                </li>
                
                <li class="nav-item mt-3 mb-1 px-3">
                    <span class="text-muted small fw-bold text-uppercase">営業・契約</span>
                </li>
                
                <li class="nav-item">
                    <a th:href="@{/proposal/kanban}" class="nav-link px-3 py-2 rounded-md" th:classappend="${#strings.startsWith(currentUri, '/proposal') ? 'active bg-tertiary text-white' : 'text-secondary'}">
                        <i class="bi bi-kanban me-2"></i>
                        <span th:text="#{menu.proposal}">提案管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/contract/list}" class="nav-link px-3 py-2 rounded-md" th:classappend="${#strings.startsWith(currentUri, '/contract') ? 'active bg-tertiary text-white' : 'text-secondary'}">
                        <i class="bi bi-file-earmark-text me-2"></i>
                        <span th:text="#{menu.contract}">契約管理</span>
                    </a>
                </li>
                
                <li class="nav-item mt-3 mb-1 px-3">
                    <span class="text-muted small fw-bold text-uppercase">高度な機能</span>
                </li>
                
                <li class="nav-item">
                    <a th:href="@{/ai/matching}" class="nav-link px-3 py-2 rounded-md d-flex justify-content-between align-items-center" th:classappend="${#strings.startsWith(currentUri, '/ai') ? 'active bg-tertiary text-white' : 'text-secondary'}">
                        <div>
                            <i class="bi bi-robot me-2 text-accent-purple"></i>
                            <span th:text="#{menu.ai}">AI機能</span>
                        </div>
                        <span class="badge bg-purple rounded-pill shadow-sm">AI</span>
                    </a>
                <li class="nav-item">
                    <a th:href="@{/email/template/list}" class="nav-link px-3 py-2 rounded-md" th:classappend="${#strings.startsWith(currentUri, '/email')} ? 'active bg-tertiary text-white' : 'text-secondary'">
                        <i class="bi bi-envelope-paper me-2"></i>
                        <span th:text="#{menu.email.template}">メールテンプレート</span>
                    </a>
                </li>
            </ul>
        </div>
        
        <!-- User Footer Area -->
        <div class="sidebar-footer p-3 border-top border-dark mt-auto">
            <div class="d-flex align-items-center mb-2">
                <div class="avatar bg-gradient-blue text-white rounded-circle d-flex justify-content-center align-items-center me-3 shadow-sm" style="width: 40px; height: 40px;">
                    <span sec:authentication="name" class="fw-bold fs-6 text-uppercase" th:text="${#strings.substring(#authentication.name,0,1)}">A</span>
                </div>
                <div class="user-info flex-grow-1 overflow-hidden">
                    <div class="fw-bold text-white text-truncate" sec:authentication="name">User Name</div>
                    <div class="small text-muted text-truncate">
                        <span class="badge bg-tertiary text-secondary border border-dark rounded-pill px-2" sec:authentication="principal.authorities">Role</span>
                    </div>
                </div>
            </div>
            <form th:action="@{/logout}" method="post" class="mt-2">
                <button type="submit" class="btn btn-sm btn-outline-secondary w-100 border-0 text-start text-muted hover-text-white hover-bg-tertiary rounded-md">
                    <i class="bi bi-box-arrow-right me-2"></i><span th:text="#{menu.logout}">ログアウト</span>
                </button>
            </form>
        </div>
    </aside>
</body>
</html>
